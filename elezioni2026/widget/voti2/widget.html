<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Risultati Sindaco Agrigento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:transparent;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* WIDGET */

.widget{

width:100%;
max-width:760px;

margin:0 auto;

overflow:hidden;
border-radius:10px;

background:
linear-gradient(
135deg,
#06152f 0%,
#0b3d91 50%,
#1e63d6 100%
);

box-shadow:0 8px 24px rgba(0,0,0,0.18);

color:#fff;

}

/* HEADER */

.header{

padding:16px 18px;

display:flex;
justify-content:space-between;
align-items:center;

border-bottom:
1px solid rgba(255,255,255,0.12);

}

.small{
font-size:11px;
text-transform:uppercase;
letter-spacing:2px;
opacity:0.7;
margin-bottom:5px;
}

.title{
font-size:28px;
font-weight:800;
line-height:1;
}

.live{

background:#e02020;

padding:6px 10px;

border-radius:30px;

font-size:13px;
font-weight:700;
letter-spacing:1px;

}

/* RIGHE */

.row{

display:flex;
align-items:center;

padding:14px 18px;

border-bottom:
1px solid rgba(255,255,255,0.08);

}

.name{
width:34%;
font-size:18px;
font-weight:700;
}

.barwrap{

width:46%;
height:14px;

background:
rgba(255,255,255,0.12);

border-radius:30px;

overflow:hidden;

margin:0 14px;

}

.bar{

height:100%;

background:#ffffff;

border-radius:30px;

transition:all .5s ease;

}

.right{
width:20%;
text-align:right;
}

.percent{
font-size:28px;
font-weight:800;
line-height:1;
}

.voti{
font-size:12px;
opacity:0.8;
margin-top:4px;
}

/* FOOTER */

.footer{

padding:10px;

text-align:center;

font-size:12px;

background:
rgba(0,0,0,0.15);

opacity:0.85;

}

/* MOBILE */

@media(max-width:700px){

.row{
flex-wrap:wrap;
}

.name{
width:100%;
margin-bottom:10px;
}

.barwrap{
width:100%;
margin:0;
}

.right{
width:100%;
margin-top:10px;
text-align:left;
}

}

</style>

</head>

<body>

<div class="widget">

<!-- HEADER -->

<div class="header">

<div>

<div class="small">
ELEZIONI COMUNALI
</div>

<div class="title">
Corsa a Sindaco
</div>

</div>

<div class="live">
● LIVE
</div>

</div>

<!-- ALONGE -->

<div class="row">

<div class="name">
DINO ALONGE
</div>

<div class="barwrap">
<div class="bar" id="bar-alonge" style="width:0%"></div>
</div>

<div class="right">

<div class="percent" id="alonge">
0%
</div>

<div class="voti" id="voti-alonge">
0 voti
</div>

</div>

</div>

<!-- SODANO -->

<div class="row">

<div class="name">
MICHELE SODANO
</div>

<div class="barwrap">
<div class="bar" id="bar-sodano" style="width:0%"></div>
</div>

<div class="right">

<div class="percent" id="sodano">
0%
</div>

<div class="voti" id="voti-sodano">
0 voti
</div>

</div>

</div>

<!-- DI ROSA -->

<div class="row">

<div class="name">
GIUSEPPE DI ROSA
</div>

<div class="barwrap">
<div class="bar" id="bar-dirosa" style="width:0%"></div>
</div>

<div class="right">

<div class="percent" id="dirosa">
0%
</div>

<div class="voti" id="voti-dirosa">
0 voti
</div>

</div>

</div>

<!-- GENTILE -->

<div class="row" style="border-bottom:0;">

<div class="name">
LUIGI GENTILE
</div>

<div class="barwrap">
<div class="bar" id="bar-gentile" style="width:0%"></div>
</div>

<div class="right">

<div class="percent" id="gentile">
0%
</div>

<div class="voti" id="voti-gentile">
0 voti
</div>

</div>

</div>

<!-- FOOTER -->

<div class="footer" id="sezioni">
Sezioni scrutinate: 0 / 55
</div>

</div>

<script>

async function aggiornaDati() {

try {

const response = await fetch(
'dati.json?t=' + Date.now(),
{
cache:'no-store'
}
);

const data = await response.json();

/* TOTALE VOTI */

const totale =
data.alonge +
data.sodano +
data.dirosa +
data.gentile;

/* PERCENTUALI */

const percAlonge =
totale > 0
? ((data.alonge / totale) * 100).toFixed(1)
: 0;

const percSodano =
totale > 0
? ((data.sodano / totale) * 100).toFixed(1)
: 0;

const percDirosa =
totale > 0
? ((data.dirosa / totale) * 100).toFixed(1)
: 0;

const percGentile =
totale > 0
? ((data.gentile / totale) * 100).toFixed(1)
: 0;

/* TESTI */

document.getElementById('alonge').innerText =
percAlonge + '%';

document.getElementById('sodano').innerText =
percSodano + '%';

document.getElementById('dirosa').innerText =
percDirosa + '%';

document.getElementById('gentile').innerText =
percGentile + '%';

/* BARRE */

document.getElementById('bar-alonge').style.width =
percAlonge + '%';

document.getElementById('bar-sodano').style.width =
percSodano + '%';

document.getElementById('bar-dirosa').style.width =
percDirosa + '%';

document.getElementById('bar-gentile').style.width =
percGentile + '%';

/* VOTI */

document.getElementById('voti-alonge').innerText =
data.alonge.toLocaleString('it-IT') + ' voti';

document.getElementById('voti-sodano').innerText =
data.sodano.toLocaleString('it-IT') + ' voti';

document.getElementById('voti-dirosa').innerText =
data.dirosa.toLocaleString('it-IT') + ' voti';

document.getElementById('voti-gentile').innerText =
data.gentile.toLocaleString('it-IT') + ' voti';

/* SEZIONI */

document.getElementById('sezioni').innerText =
'Sezioni scrutinate: ' + data.sezioni;

}
catch(error){

console.log(error);

}

}

aggiornaDati();

setInterval(aggiornaDati,10000);

</script>

</body>
</html>
