<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ballottaggio Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

margin:0;
padding:0;

font-family:'Inter',sans-serif;

background:#07152d;

color:#fff;

overflow-x:hidden;

}

/* WRAPPER */

.widget{

width:100%;

padding:22px;

background:
linear-gradient(
135deg,
#061327 0%,
#0a2d67 55%,
#1d63d8 100%
);

border-radius:28px;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:flex-start;

gap:20px;

flex-wrap:wrap;

margin-bottom:22px;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:9px 16px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:11px;

font-weight:900;

letter-spacing:1px;

backdrop-filter:blur(10px);

}

.dot{

width:9px;
height:9px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.4);
}

100%{
transform:scale(1);
}

}

.title{

font-size:46px;

font-weight:900;

line-height:.95;

letter-spacing:-2px;

text-transform:uppercase;

}

.update{

margin-top:8px;

font-size:12px;

font-weight:700;

opacity:.72;

}

/* SEZIONI */

.sezioni{

margin-bottom:24px;

padding:20px;

border-radius:22px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

}

.sezioni-label{

font-size:11px;

font-weight:900;

letter-spacing:1px;

opacity:.7;

margin-bottom:10px;

}

.sezioni-numero{

font-size:64px;

font-weight:900;

line-height:1;

letter-spacing:-3px;

}

.sezioni-small{

margin-top:6px;

font-size:12px;

font-weight:700;

opacity:.7;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:22px;

}

/* CARD */

.card{

position:relative;

overflow:hidden;

border-radius:30px;

padding:28px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.10),
rgba(255,255,255,.05)
);

border:
1px solid rgba(255,255,255,.10);

backdrop-filter:blur(14px);

display:flex;

flex-direction:column;

min-height:360px;

}

/* GOLD LIGHT */

.card::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
radial-gradient(
circle at top left,
rgba(255,215,0,.10),
transparent 35%
);

pointer-events:none;

}

/* PERCENTUALE */

.percentuale{

position:absolute;

right:24px;

bottom:95px;

font-size:72px;

font-weight:900;

line-height:1;

letter-spacing:-2px;

pointer-events:none;

z-index:1;

white-space:nowrap;

color:#ffffff;

text-shadow:
0 2px 10px rgba(0,0,0,.35);

}

/* BADGE */

.badge-row{

display:flex;

justify-content:flex-end;

position:relative;

z-index:20;

margin-bottom:10px;

}

.ballottaggio-badge{

padding:8px 16px;

border-radius:999px;

font-size:11px;

font-weight:900;

letter-spacing:1px;

background:#ffd700;

color:#1b1400;

}

.eletto-badge{

background:
linear-gradient(
90deg,
#19ff96,
#00ca6d
);

color:#001b0d;

}

/* TOP */

.top{

display:flex;

align-items:center;

gap:18px;

position:relative;

z-index:10;

}

/* FOTO */

.foto-wrap{

position:relative;

flex:none;

}

.foto{

width:120px;
height:120px;

border-radius:50%;

object-fit:cover;

border:
5px solid rgba(255,255,255,.14);

box-shadow:
0 10px 24px rgba(0,0,0,.30);

background:#fff;

}

/* INFO */

.info{

flex:1;

position:relative;

z-index:10;

}

.nome{

font-size:36px;

font-weight:900;

line-height:1;

letter-spacing:-2px;

text-transform:uppercase;

max-width:70%;

position:relative;

z-index:10;

}

.voti{

margin-top:10px;

font-size:18px;

font-weight:700;

opacity:.75;

}

/* BOTTOM */

.bottom{

margin-top:auto;

position:relative;

z-index:10;

padding-top:26px;

}

/* BAR */

.bar{

width:100%;

height:18px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

transition:width .4s ease;

}

/* LABEL */

.label{

margin-top:12px;

font-size:12px;

font-weight:800;

letter-spacing:1px;

opacity:.75;

}

/* TABLET */

@media(max-width:1200px){

.nome{

font-size:30px;

}

.percentuale{

font-size:64px;

bottom:90px;

right:20px;

}

}

/* MOBILE */

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.title{

font-size:34px;

}

.card{

min-height:auto;

}

.nome{

font-size:28px;

}

.percentuale{

font-size:54px;

bottom:85px;

right:15px;

}
.foto{

width:100px;
height:100px;

}

}

/* SMALL */

@media(max-width:600px){

.widget{

padding:16px;

border-radius:0;

}

.title{

font-size:26px;

}

.sezioni-numero{

font-size:48px;

}

.top{

align-items:flex-start;

}

.nome{

font-size:22px;

max-width:100%;

}

.percentuale{

font-size:44px;

bottom:80px;

right:14px;

letter-spacing:-1px;

}

.voti{

font-size:15px;

}

.card{

padding:22px;

border-radius:24px;

}

.foto{

width:88px;
height:88px;

}

}

</style>

</head>

<body>

<div class="widget">

<!-- HEADER -->

<div class="header">

<div class="live">

<div class="dot"></div>

BALLOTTAGGIO LIVE

</div>

<div>

<div class="title">
BALLOTTAGGIO AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- SEZIONI -->

<div class="sezioni">

<div class="sezioni-label">
SEZIONI SCRUTINATE
</div>

<div class="sezioni-numero" id="sezioni">
0/57
</div>

<div class="sezioni-small">
SEZIONI SCRUTINATE
</div>

</div>

<!-- GRID -->

<div class="grid" id="grid"></div>

</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2';

const supabase =
createClient(
'https://xpfmzutnptmznadzemlh.supabase.co',
'sb_publishable_Tmn1caezI5nut_GJpMDr7Q_Qu7m7rzP'
);

async function aggiorna(){

const { data:candidati,error:e1 } =
await supabase
.from('ballottaggio')
.select('*')
.eq('attivo',true)
.order('ordine');

const { data:config,error:e2 } =
await supabase
.from('config')
.select('*')
.single();

if(e1 || e2){
console.error(e1 || e2);
return;
}

document
.getElementById('sezioni')
.innerText =
config.sezioni_scrutinate +
'/' +
config.sezioni_totali;

const totaleVoti =
candidati.reduce(
(sum,c)=>sum + Number(c.voti),
0
);

let html='';

candidati.forEach(c=>{

const percentuale =
totaleVoti > 0
?
(
(c.voti / totaleVoti)
* 100
).toFixed(2)
:
'0.00';

html += `

<div class="card">

<div class="percentuale">
${percentuale}%
</div>

<div class="badge-row">

<div class="ballottaggio-badge">
BALLOTTAGGIO
</div>

</div>

<div class="top">

<div class="foto-wrap">

<img
class="foto"
src="${c.foto}"
alt="${c.nome}"
>

</div>

<div class="info">

<div class="nome">
${c.nome}
</div>

<div class="voti">
${Number(c.voti).toLocaleString('it-IT')} voti
</div>

</div>

</div>

<div class="bottom">

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

</div>

`;

});

document
.getElementById('grid')
.innerHTML =
html;

document
.getElementById('update')
.innerText =
config.ultimo_aggiornamento
?
'Ultimo aggiornamento: ' +
config.ultimo_aggiornamento
:
'Aggiornamento in tempo reale';

}

aggiorna();

setInterval(
aggiorna,
3000
);

</script>

</body>

</html>
