```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agrigento 2026 - Sindaco Eletto</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:#07152d;

padding:20px;

}

.election-banner{

width:100%;

display:flex;
align-items:center;
gap:24px;

padding:20px 24px;

background:
linear-gradient(
135deg,
#061327 0%,
#0a2d67 55%,
#1d63d8 100%
);

border-radius:28px;

border:
1px solid rgba(255,255,255,.10);

box-shadow:
0 10px 30px rgba(0,0,0,.25);

color:#fff;

}

/* CANDIDATI */

.candidate{

display:flex;

align-items:center;

gap:14px;

min-width:0;

}

.winner{

flex:1.2;

}

.candidate-photo{

width:72px;
height:72px;

border-radius:50%;

object-fit:cover;

border:
4px solid rgba(255,255,255,.15);

background:#fff;

box-shadow:
0 8px 20px rgba(0,0,0,.25);

}

.candidate-info{

display:flex;

flex-direction:column;

min-width:0;

}

.elected-badge{

display:inline-flex;

align-items:center;

width:max-content;

padding:6px 12px;

margin-bottom:6px;

border-radius:999px;

background:
linear-gradient(
90deg,
#19ff96,
#00ca6d
);

color:#001b0d;

font-size:11px;

font-weight:900;

letter-spacing:1px;

}

.candidate-name{

font-size:22px;

font-weight:900;

line-height:1;

letter-spacing:-1px;

text-transform:uppercase;

}

.candidate-percent{

font-size:48px;

font-weight:900;

line-height:1;

white-space:nowrap;

margin-left:10px;

}

/* VS */

.vs{

font-size:22px;

font-weight:900;

opacity:.35;

}

/* PULSANTE */

.results-btn{

margin-left:auto;

padding:12px 20px;

border-radius:999px;

background:#fff;

color:#0a2d67;

font-size:13px;

font-weight:900;

text-decoration:none;

white-space:nowrap;

transition:.2s;

}

.results-btn:hover{

transform:translateY(-2px);

}

/* TABLET */

@media(max-width:1100px){

.candidate-name{

font-size:18px;

}

.candidate-percent{

font-size:38px;

}

}

/* MOBILE */

@media(max-width:900px){

.election-banner{

flex-wrap:wrap;

gap:16px;

padding:18px;

}

.vs{

display:none;

}

.candidate{

width:100%;

}

.results-btn{

width:100%;

text-align:center;

margin-left:0;

}

.candidate-percent{

margin-left:auto;

}

}

/* SMALL */

@media(max-width:520px){

body{

padding:10px;

}

.candidate-photo{

width:56px;
height:56px;

}

.candidate-name{

font-size:15px;

}

.candidate-percent{

font-size:28px;

}

.elected-badge{

font-size:9px;

padding:5px 10px;

}

}

</style>

</head>

<body>

<div class="election-banner">

    <!-- MICHELE SODANO -->

    <div class="candidate winner">

        <img
        class="candidate-photo"
        src="https://www.ansa.it/webimages/news_base/2026/5/18/cf0a480d30f98aff336ed91166a41d8c.jpg"
        alt="Michele Sodano">

        <div class="candidate-info">

            <div class="elected-badge">
                ✓ SINDACO ELETTO
            </div>

            <div class="candidate-name">
                Michele Sodano
            </div>

        </div>

        <div class="candidate-percent">
            72,31%
        </div>

    </div>

    <div class="vs">
        VS
    </div>

    <!-- DINO ALONGE -->

    <div class="candidate">

        <img
        class="candidate-photo"
        src="https://www.repstatic.it/content/localirep/img/rep-palermo/2026/05/23/115901594-b96acdd2-2e46-4c92-b633-d829273e4528.jpg"
        alt="Dino Alonge">

        <div class="candidate-info">

            <div class="candidate-name">
                Dino Alonge
            </div>

        </div>

        <div class="candidate-percent">
            27,69%
        </div>

    </div>

    <!-- LINK -->

    <a
    class="results-btn"
    href="https://regionale.grandangolosettimanale.it/"
    target="_blank">

        RISULTATI COMPLETI →

    </a>

</div>

</body>
</html>
```
