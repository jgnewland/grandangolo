<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ballottaggio Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

margin:0;
padding:0;

font-family:'Inter',sans-serif;

background:transparent;

overflow:hidden;

}

/* BACKGROUND */

.widget{

width:100%;

padding:24px;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

color:#fff;

min-height:100vh;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:flex-start;

margin-bottom:24px;

gap:20px;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

letter-spacing:1px;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.title{

font-size:62px;

font-weight:900;

line-height:.95;

letter-spacing:-3px;

text-transform:uppercase;

}

.update{

font-size:14px;

font-weight:700;

margin-top:10px;

opacity:.7;

}

/* SEZIONI */

.sezioni-box{

margin-bottom:30px;

padding:30px;

border-radius:30px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);

}

.sezioni-label{

font-size:12px;

font-weight:900;

letter-spacing:1px;

margin-bottom:18px;

opacity:.7;

}

.sezioni-content{

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

}

.sezioni-numero{

font-size:92px;

font-weight:900;

line-height:1;

letter-spacing:-4px;

}

.sezioni-small{

margin-top:8px;

font-size:16px;

font-weight:800;

opacity:.7;

letter-spacing:1px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:28px;

align-items:stretch;

}

/* CARD */

.card{

position:relative;

padding:34px;

border-radius:36px;

background:
linear-gradient(
135deg,
rgba(255,215,0,.14),
rgba(255,180,0,.05)
);

border:
2px solid rgba(255,215,0,.40);

backdrop-filter:blur(14px);

box-shadow:
0 0 45px rgba(255,215,0,.16);

overflow:hidden;

min-height:520px;

display:flex;

flex-direction:column;

justify-content:flex-end;

}

/* BADGE */

.badge-row{

display:flex;

justify-content:flex-end;

margin-bottom:10px;

position:relative;

z-index:20;

}

.ballottaggio-badge{

padding:9px 18px;

border-radius:999px;

font-size:12px;

font-weight:900;

letter-spacing:1px;

background:#ffd700;

color:#1b1400;

}

/* ELETTO */

.eletto-badge{

background:
linear-gradient(
90deg,
#16ff90,
#00c96b
) !important;

color:#001b0d !important;

box-shadow:
0 0 18px rgba(22,255,144,.45);

}

/* TOP AREA */

.top{

position:relative;

height:320px;

margin-bottom:10px;

}

/* FOTO */

.foto-wrap{

position:absolute;

left:-20px;

bottom:-40px;

width:340px;

height:340px;

display:flex;

align-items:flex-end;

justify-content:center;

z-index:5;

}

.foto{

max-height:380px;

max-width:320px;

object-fit:contain;

filter:
drop-shadow(0 18px 34px rgba(0,0,0,.50));

}

/* INFO */

.info{

position:absolute;

left:240px;

bottom:80px;

z-index:10;

max-width:60%;

}

.nome{

font-size:52px;

font-weight:900;

line-height:.92;

letter-spacing:-2px;

text-transform:uppercase;

}

.voti{

font-size:24px;

font-weight:700;

margin-top:12px;

opacity:.78;

}

/* PERCENTUALE */

.percentuale{

position:absolute;

right:28px;

bottom:110px;

font-size:220px;

font-weight:900;

line-height:.82;

opacity:.12;

z-index:1;

pointer-events:none;

letter-spacing:-8px;

}

/* BAR */

.bar{

position:relative;

z-index:15;

width:100%;

height:22px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

margin-top:18px;

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

transition:width .5s ease;

}

/* LABEL */

.label{

position:relative;

z-index:15;

margin-top:16px;

font-size:14px;

font-weight:800;

letter-spacing:1px;

opacity:.75;

}

/* MOBILE */

@media(max-width:1400px){

.nome{

font-size:42px;

}

.percentuale{

font-size:180px;

}

}

@media(max-width:1100px){

.grid{

grid-template-columns:1fr;

}

.card{

min-height:460px;

}

}

@media(max-width:700px){

.widget{

padding:16px;

}

.title{

font-size:36px;

}

.sezioni-numero{

font-size:58px;

}

.top{

height:230px;

}

.foto-wrap{

width:220px;
height:220px;

left:-10px;

}

.foto{

max-height:240px;

max-width:200px;

}

.info{

left:150px;

bottom:50px;

}

.nome{

font-size:28px;

}

.voti{

font-size:16px;

}

.percentuale{

font-size:110px;

right:18px;

bottom:90px;

}

.card{

min-height:390px;

padding:24px;

}

}

</style>

</head>

<body>

<div class="widget">

<!-- HEADER -->

<div class="header">

<div class="live">

<div class="dot"></div>

BALLOTTAGGIO LIVE

</div>

<div>

<div class="title">
BALLOTTAGGIO AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- SEZIONI -->

<div class="sezioni-box">

<div class="sezioni-label">
SEZIONI SCRUTINATE
</div>

<div class="sezioni-content">

<div class="sezioni-numero" id="sezioni">
0/57
</div>

<div class="sezioni-small">
SEZIONI SCRUTINATE
</div>

</div>

</div>

<!-- GRID -->

<div class="grid" id="grid"></div>

</div>

<script>

async function aggiorna(){

const response =
await fetch(
'ballottaggio.json?v=' + new Date().getTime()
);

const data =
await response.json();

const agrigento =
data["Agrigento"];

document
.getElementById('sezioni')
.innerText =
agrigento.sezioni_scrutinate +
'/' +
agrigento.sezioni_totali;

const totaleVoti =
agrigento.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let html = '';

agrigento.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
totaleVoti > 0
?
((c.voti / totaleVoti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="badge-row">

<div class="ballottaggio-badge ${
c.stato === 'eletto'
? 'eletto-badge'
: ''
}">

${c.stato === 'eletto'
? 'SINDACO ELETTO'
: 'BALLOTTAGGIO'}

</div>

</div>

<div class="top">

<div class="foto-wrap">

<img
class="foto"
src="${c.foto}"
>

</div>

<div class="info">

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document
.getElementById('grid')
.innerHTML =
html;

document
.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}

aggiorna();

setInterval(aggiorna,3000);

</script>

</body>

</html>
