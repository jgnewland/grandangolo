<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ballottaggio Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

margin:0;
padding:0;

font-family:'Inter',sans-serif;

background:#06142d;

overflow-x:hidden;

color:#fff;

}

/* BACKGROUND */

.widget{

width:100%;

min-height:100vh;

padding:24px;

background:
radial-gradient(
circle at top left,
rgba(255,215,0,.08),
transparent 28%
),

linear-gradient(
135deg,
#031022 0%,
#0a2a5e 55%,
#225fd0 100%
);

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:flex-start;

gap:20px;

margin-bottom:24px;

flex-wrap:wrap;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

letter-spacing:1px;

backdrop-filter:blur(10px);

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.45);
}

100%{
transform:scale(1);
}

}

.title{

font-size:58px;

font-weight:900;

line-height:.95;

letter-spacing:-3px;

text-transform:uppercase;

}

.update{

margin-top:10px;

font-size:13px;

font-weight:700;

opacity:.75;

}

/* SEZIONI */

.sezioni-box{

margin-bottom:28px;

padding:24px;

border-radius:28px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(12px);

}

.sezioni-label{

font-size:11px;

font-weight:900;

letter-spacing:1px;

opacity:.7;

margin-bottom:16px;

}

.sezioni-content{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

}

.sezioni-numero{

font-size:88px;

font-weight:900;

line-height:1;

letter-spacing:-4px;

}

.sezioni-small{

margin-top:8px;

font-size:14px;

font-weight:800;

letter-spacing:1px;

opacity:.7;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:24px;

}

/* CARD */

.card{

position:relative;

overflow:hidden;

border-radius:36px;

padding:34px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.10),
rgba(255,255,255,.04)
);

border:
1px solid rgba(255,255,255,.12);

backdrop-filter:blur(14px);

min-height:500px;

display:flex;

flex-direction:column;

justify-content:space-between;

}

/* GOLD LIGHT */

.card::before{

content:"";

position:absolute;

inset:0;

background:
radial-gradient(
circle at top left,
rgba(255,215,0,.12),
transparent 45%
);

pointer-events:none;

}

/* BADGE */

.badge-row{

display:flex;

justify-content:flex-end;

position:relative;

z-index:20;

}

.ballottaggio-badge{

padding:10px 18px;

border-radius:999px;

font-size:11px;

font-weight:900;

letter-spacing:1px;

background:#ffd700;

color:#1b1400;

}

.eletto-badge{

background:
linear-gradient(
90deg,
#19ff96,
#00ca6d
);

color:#001d10;

box-shadow:
0 0 18px rgba(25,255,150,.4);

}

/* HERO */

.hero{

position:relative;

display:flex;

align-items:flex-end;

justify-content:space-between;

gap:20px;

flex:1;

margin-top:10px;

}

/* FOTO */

.foto-wrap{

position:relative;

width:46%;

display:flex;

align-items:flex-end;

justify-content:center;

height:340px;

z-index:5;

}

.foto{

max-width:100%;

max-height:360px;

object-fit:contain;

filter:
drop-shadow(0 14px 28px rgba(0,0,0,.45));

}

/* INFO */

.info{

width:54%;

position:relative;

z-index:10;

padding-bottom:26px;

}

.nome{

font-size:48px;

font-weight:900;

line-height:.92;

letter-spacing:-2px;

text-transform:uppercase;

max-width:95%;

}

.voti{

margin-top:14px;

font-size:24px;

font-weight:700;

opacity:.78;

}

/* PERCENTUALE */

.percentuale{

position:absolute;

right:-10px;

bottom:0;

font-size:180px;

font-weight:900;

line-height:.8;

letter-spacing:-8px;

opacity:.10;

pointer-events:none;

z-index:1;

}

/* BAR */

.bar{

position:relative;

z-index:20;

margin-top:26px;

width:100%;

height:22px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

transition:width .4s ease;

}

/* LABEL */

.label{

position:relative;

z-index:20;

margin-top:14px;

font-size:13px;

font-weight:800;

letter-spacing:1px;

opacity:.75;

}

/* TABLET */

@media(max-width:1300px){

.nome{

font-size:40px;

}

.percentuale{

font-size:150px;

}

}

/* MOBILE */

@media(max-width:980px){

.grid{

grid-template-columns:1fr;

}

.title{

font-size:42px;

}

.hero{

flex-direction:column;

align-items:center;

justify-content:center;

text-align:center;

}

.foto-wrap{

width:100%;

height:260px;

}

.foto{

max-height:280px;

}

.info{

width:100%;

padding-bottom:0;

}

.nome{

font-size:36px;

max-width:100%;

}

.voti{

font-size:18px;

}

.percentuale{

position:relative;

right:auto;

bottom:auto;

margin-top:14px;

font-size:120px;

text-align:center;

}

.card{

min-height:auto;

}

.sezioni-numero{

font-size:64px;

}

}

/* SMALL MOBILE */

@media(max-width:600px){

.widget{

padding:16px;

}

.title{

font-size:30px;

letter-spacing:-1px;

}

.nome{

font-size:28px;

}

.percentuale{

font-size:90px;

}

.bar{

height:18px;

}

}

</style>

</head>

<body>

<div class="widget">

<!-- HEADER -->

<div class="header">

<div class="live">

<div class="dot"></div>

BALLOTTAGGIO LIVE

</div>

<div>

<div class="title">
BALLOTTAGGIO AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- SEZIONI -->

<div class="sezioni-box">

<div class="sezioni-label">
SEZIONI SCRUTINATE
</div>

<div class="sezioni-content">

<div class="sezioni-numero" id="sezioni">
0/57
</div>

<div class="sezioni-small">
SEZIONI SCRUTINATE
</div>

</div>

</div>

<!-- GRID -->

<div class="grid" id="grid"></div>

</div>

<script>

async function aggiorna(){

const response =
await fetch(
'ballottaggio.json?v=' + new Date().getTime()
);

const data =
await response.json();

const agrigento =
data["Agrigento"];

document
.getElementById('sezioni')
.innerText =
agrigento.sezioni_scrutinate +
'/' +
agrigento.sezioni_totali;

const totaleVoti =
agrigento.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let html = '';

agrigento.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
totaleVoti > 0
?
((c.voti / totaleVoti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="badge-row">

<div class="ballottaggio-badge ${
c.stato === 'eletto'
? 'eletto-badge'
: ''
}">

${c.stato === 'eletto'
? 'SINDACO ELETTO'
: 'BALLOTTAGGIO'}

</div>

</div>

<div class="hero">

<div class="foto-wrap">

<img
class="foto"
src="${c.foto}"
>

</div>

<div class="info">

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

<div class="percentuale">
${percentuale}%
</div>

</div>

</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document
.getElementById('grid')
.innerHTML =
html;

document
.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}

aggiorna();

setInterval(aggiorna,3000);

</script>

</body>

</html>
