<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ballottaggio Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

margin:0;
padding:0;

font-family:'Inter',sans-serif;

background:transparent;

overflow:hidden;

}

.widget{

width:100%;

padding:20px;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

color:#fff;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:flex-start;

margin-bottom:20px;

gap:20px;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:8px 16px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:11px;

font-weight:900;

letter-spacing:1px;

}

.dot{

width:9px;
height:9px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.title{

font-size:42px;

font-weight:900;

line-height:1;

}

.update{

font-size:12px;

font-weight:700;

margin-top:8px;

opacity:.7;

}

/* SEZIONI */

.sezioni-box{

margin-bottom:20px;

padding:18px;

border-radius:20px;

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(10px);

}

.sezioni-label{

font-size:11px;

font-weight:900;

letter-spacing:1px;

margin-bottom:12px;

opacity:.7;

}

.sezioni-content{

display:flex;

align-items:center;

justify-content:center;

flex-direction:column;

}

.sezioni-numero{

font-size:54px;

font-weight:900;

line-height:1;

}

.sezioni-small{

margin-top:6px;

font-size:13px;

font-weight:800;

opacity:.7;

letter-spacing:1px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

/* CARD */

.card{

position:relative;

padding:22px;

border-radius:28px;

background:
linear-gradient(
135deg,
rgba(255,215,0,.18),
rgba(255,180,0,.08)
);

border:
2px solid rgba(255,215,0,.5);

backdrop-filter:blur(12px);

box-shadow:
0 0 25px rgba(255,215,0,.18);

}

.badge-row{

display:flex;

justify-content:flex-end;

margin-bottom:10px;

}

.ballottaggio-badge{

padding:7px 14px;

border-radius:999px;

font-size:11px;

font-weight:900;

letter-spacing:1px;

background:#ffd700;

color:#1b1400;

}

.top{

display:flex;

align-items:center;

gap:14px;

margin-bottom:18px;

}

.foto{

width:74px;
height:74px;

border-radius:50%;

object-fit:cover;

border:
4px solid rgba(255,255,255,.22);

background:#fff;

}

.nome{

font-size:22px;

font-weight:900;

line-height:1.1;

}

.voti{

font-size:14px;

font-weight:700;

margin-top:6px;

opacity:.75;

}

.percentuale{

font-size:68px;

font-weight:900;

line-height:1;

margin-bottom:18px;

}

.bar{

width:100%;

height:16px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

transition:width .5s ease;

}

.label{

margin-top:10px;

font-size:11px;

font-weight:800;

letter-spacing:1px;

opacity:.7;

}

/* MOBILE */

@media(max-width:900px){

.grid{

grid-template-columns:1fr;

}

.title{

font-size:30px;

}

.percentuale{

font-size:52px;

}

}

</style>

</head>

<body>

<div class="widget">

<div class="header">

<div class="live">

<div class="dot"></div>

BALLOTTAGGIO LIVE

</div>

<div>

<div class="title">
BALLOTTAGGIO AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- SEZIONI -->

<div class="sezioni-box">

<div class="sezioni-label">
SEZIONI SCRUTINATE
</div>

<div class="sezioni-content">

<div class="sezioni-numero" id="sezioni">
0/57
</div>

<div class="sezioni-small">
SEZIONI SCRUTINATE
</div>

</div>

</div>

<!-- GRID -->

<div class="grid" id="grid"></div>

</div>

<script>

async function aggiorna(){

const response =
await fetch(
'ballottaggio.json?v=' + new Date().getTime()
);

const data =
await response.json();

const agrigento =
data["Agrigento"];

document
.getElementById('sezioni')
.innerText =
agrigento.sezioni_scrutinate +
'/' +
agrigento.sezioni_totali;

const totaleVoti =
agrigento.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let html = '';

agrigento.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
totaleVoti > 0
?
((c.voti / totaleVoti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="badge-row">

<div class="ballottaggio-badge">
BALLOTTAGGIO
</div>

</div>

<div class="top">

<img
class="foto"
src="${c.foto}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document
.getElementById('grid')
.innerHTML =
html;

document
.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}

aggiorna();

setInterval(aggiorna,3000);

</script>

</body>
</html>
