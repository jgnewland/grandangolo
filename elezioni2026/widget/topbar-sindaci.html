<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elezioni Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{

margin:0;
padding:0;

font-family:'Inter',sans-serif;

background:transparent;

overflow:hidden;

}

.widget{

position:relative;

width:100%;

padding:18px;

overflow:hidden;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:flex-start;

gap:20px;

margin-bottom:16px;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:8px 16px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:11px;

font-weight:900;

letter-spacing:1px;

color:#fff;

}

.dot{

width:9px;
height:9px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.title{

font-size:34px;

font-weight:900;

line-height:1;

color:#fff;

}

.update{

font-size:11px;

font-weight:700;

margin-top:6px;

color:
rgba(255,255,255,.7);

}

/* SEZIONI */

.sezioni-wrapper{

margin-bottom:14px;

}

.sezioni-box{

background:
rgba(255,255,255,.06);

border:
1px solid rgba(255,255,255,.06);

border-radius:18px;

padding:12px;

backdrop-filter:blur(10px);

}

.sezioni-label{

font-size:10px;

font-weight:900;

letter-spacing:1px;

margin-bottom:10px;

color:
rgba(255,255,255,.65);

}

.sezioni-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(90px,1fr));

gap:8px;

}

.sezione-item{

padding:8px;

border-radius:12px;

background:
rgba(255,255,255,.04);

text-align:center;

color:#fff;

}

.sezione-comune{

font-size:10px;

font-weight:800;

margin-bottom:4px;

opacity:.8;

line-height:1.1;

}

.sezione-numero{

font-size:16px;

font-weight:900;

line-height:1;

}

.sezione-small{

font-size:9px;

font-weight:700;

opacity:.55;

margin-top:4px;

letter-spacing:.5px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:14px;

margin-bottom:16px;

}

/* CARD */

.card{

position:relative;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

border-top:
4px solid #42ffd0;

border-radius:22px;

padding:16px;

backdrop-filter:blur(10px);

color:#fff;

}

/* CARD GOLD */

.gold-card{

border-top:4px solid #ffd700;

background:
linear-gradient(
135deg,
rgba(255,215,0,.18),
rgba(255,180,0,.08)
);

box-shadow:
0 0 25px rgba(255,215,0,.18);

}

.gold-fill{

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
) !important;

}

/* BADGE */

.badge-row{

display:flex;

justify-content:flex-end;

margin-bottom:10px;

}

.ballottaggio-badge{

display:inline-flex;

align-items:center;

justify-content:center;

padding:6px 12px;

border-radius:999px;

font-size:10px;

font-weight:900;

letter-spacing:1px;

background:#ffd700;

color:#1b1400;

box-shadow:
0 0 12px rgba(255,215,0,.45);

}

/* TOP */

.top{

display:flex;

align-items:center;

gap:12px;

margin-bottom:14px;

}

.foto{

width:60px;
height:60px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.18);

background:#fff;

}

.nome{

font-size:14px;

font-weight:900;

line-height:1.2;

}

.voti{

font-size:11px;

font-weight:700;

opacity:.7;

margin-top:4px;

}

.percentuale{

font-size:42px;

font-weight:900;

margin-bottom:12px;

}

.bar{

width:100%;

height:12px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

transition:width .5s ease;

}

.label{

margin-top:8px;

font-size:10px;

font-weight:700;

letter-spacing:1px;

opacity:.65;

}

/* MENU */

.menu{

display:flex;

gap:8px;

overflow-x:auto;

padding-bottom:2px;

scrollbar-width:none;

}

.menu::-webkit-scrollbar{
display:none;
}

.menu button{

flex:none;

border:none;

cursor:pointer;

padding:8px 14px;

border-radius:12px;

font-size:12px;

font-weight:800;

background:
rgba(255,255,255,.08);

color:#fff;

}

/* POPUP */

.popup{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

display:none;

align-items:center;

justify-content:center;

padding:20px;

background:
rgba(2,8,23,.92);

backdrop-filter:blur(14px);

z-index:999;

}

.popup.active{

display:flex;

}

.popup-box{

width:100%;

height:100%;

overflow:auto;

border-radius:28px;

padding:24px;

background:
linear-gradient(
135deg,
#071d46 0%,
#0d3f8f 100%
);

}

.popup-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:24px;

}

.popup-header h2{

font-size:30px;

font-weight:900;

color:#fff;

}

.close{

border:none;

width:42px;
height:42px;

border-radius:50%;

cursor:pointer;

font-size:18px;

font-weight:900;

background:
rgba(255,255,255,.08);

color:#fff;

}

.popup-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(240px,1fr));

gap:16px;

}

/* MOBILE */

@media(max-width:1100px){

.grid{

grid-template-columns:
1fr 1fr;

}

}

@media(max-width:700px){

html,body{

overflow:auto;

}

.widget{

padding:14px;

}

.header{

flex-direction:column;

align-items:flex-start;

}

.title{

font-size:26px;

}

.grid{

grid-template-columns:
1fr;

}

.percentuale{

font-size:34px;

}

.popup{

padding:0;

}

.popup-box{

border-radius:0;

padding:18px;

}

.popup-header h2{

font-size:22px;

}

.popup-grid{

grid-template-columns:
1fr;

}

}

</style>

</head>

<body>

<div class="widget">

<div class="header">

<div class="live">

<div class="dot"></div>

SCRUTINIO LIVE

</div>

<div>

<div class="title">
ELEZIONI AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- SEZIONI -->

<div class="sezioni-wrapper">

<div class="sezioni-box">

<div class="sezioni-label">
SEZIONI SCRUTINATE
</div>

<div class="sezioni-grid" id="sezioni-grid"></div>

</div>

</div>

<!-- AGRIGENTO -->

<div class="grid" id="agrigento-grid"></div>

<!-- MENU -->

<div class="menu">

<button onclick="openPopup('Ribera')">Ribera</button>
<button onclick="openPopup('Camastra')">Camastra</button>
<button onclick="openPopup('Cammarata')">Cammarata</button>
<button onclick="openPopup('Casteltermini')">Casteltermini</button>
<button onclick="openPopup('Raffadali')">Raffadali</button>
<button onclick="openPopup('Sambuca di Sicilia')">Sambuca</button>
<button onclick="openPopup('Siculiana')">Siculiana</button>
<button onclick="openPopup('Villafranca Sicula')">Villafranca</button>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-box">

<div class="popup-header">

<h2 id="popup-title">
Comune
</h2>

<button class="close" onclick="closePopup()">
✕
</button>

</div>

<div class="popup-grid" id="popup-grid"></div>

</div>

</div>

</div>

<script>

window.comuniData = {};

async function aggiorna(){

const response =
await fetch(
'sindaci.json?v=' + new Date().getTime()
);

const data =
await response.json();

window.comuniData =
data;

/* SEZIONI */

let sezioniHtml = '';

Object.keys(data).forEach(nomeComune=>{

const comune =
data[nomeComune];

const percentuale =
comune.sezioni_totali > 0
?
(
(comune.sezioni_scrutinate / comune.sezioni_totali)
* 100
).toFixed(0)
:
0;

sezioniHtml += `

<div class="sezione-item">

<div class="sezione-comune">
${nomeComune}
</div>

<div class="sezione-numero">
${comune.sezioni_scrutinate}/${comune.sezioni_totali}
</div>

<div class="sezione-small">
${percentuale}% SCRUTINATE
</div>

</div>

`;

});

document
.getElementById('sezioni-grid')
.innerHTML =
sezioniHtml;

/* AGRIGENTO */

const agrigento =
data["Agrigento"];

agrigento.totale_voti =
agrigento.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let html = '';

agrigento.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach((c,index)=>{

const percentuale =
agrigento.totale_voti > 0
?
((c.voti / agrigento.totale_voti)*100).toFixed(2)
:
0;

const isBallottaggio = index < 2;

html += `

<div class="card ${isBallottaggio ? 'gold-card' : ''}">

${isBallottaggio ? `
<div class="badge-row">
<div class="ballottaggio-badge">
BALLOTTAGGIO
</div>
</div>
` : ''}

<div class="top">

<img
class="foto"
src="${c.foto}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill ${isBallottaggio ? 'gold-fill' : ''}"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document
.getElementById('agrigento-grid')
.innerHTML =
html;

document
.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}

/* POPUP */

function openPopup(nomeComune){

const comune =
window.comuniData[nomeComune];

comune.totale_voti =
comune.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

const popup =
document.getElementById('popup');

const popupTitle =
document.getElementById('popup-title');

const popupGrid =
document.getElementById('popup-grid');

popupTitle.innerText =
nomeComune;

let html = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
comune.totale_voti > 0
?
((c.voti/comune.totale_voti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

popupGrid.innerHTML =
html;

popup.classList.add('active');

}

function closePopup(){

document
.getElementById('popup')
.classList.remove('active');

}

aggiorna();

setInterval(aggiorna,3000);

</script>

</body>
</html>
