<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Elezioni Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

margin:0;

font-family:'Inter',sans-serif;

background:transparent;

overflow:hidden;

}

/* WIDGET */

.widget{

position:relative;

width:100%;

padding:20px;

overflow:hidden;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

}

/* GLOW */

.widget::before{

content:'';

position:absolute;

top:-120px;
right:-120px;

width:320px;
height:320px;

background:
radial-gradient(
circle,
rgba(0,255,170,.18),
transparent 70%
);

filter:blur(20px);

animation:float 6s infinite ease-in-out;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(20px);
}

100%{
transform:translateY(0px);
}

}

/* HEADER */

.header{

display:flex;

align-items:flex-start;

justify-content:space-between;

gap:20px;

margin-bottom:20px;

position:relative;

z-index:2;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:10px 18px;

border-radius:50px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

letter-spacing:1px;

color:#fff;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

box-shadow:
0 0 12px rgba(255,49,49,.9);

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:.4;
}

100%{
transform:scale(1);
opacity:1;
}

}

.title{

font-size:42px;

font-weight:900;

line-height:1;

color:#fff;

}

.update{

font-size:12px;

font-weight:700;

margin-top:8px;

color:
rgba(255,255,255,.7);

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:16px;

margin-bottom:20px;

position:relative;

z-index:2;

}

/* CARD */

.card{

position:relative;

overflow:hidden;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

border-top:
4px solid #42ffd0;

backdrop-filter:blur(12px);

border-radius:24px;

padding:18px;

box-shadow:
0 10px 25px rgba(0,0,0,.18);

}

.top{

display:flex;

align-items:center;

gap:14px;

margin-bottom:16px;

}

.foto{

width:68px;
height:68px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.18);

background:#fff;

}

.nome{

font-size:15px;

font-weight:900;

line-height:1.2;

color:#fff;

}

.voti{

font-size:12px;

font-weight:700;

opacity:.7;

margin-top:5px;

color:#fff;

}

.percentuale{

font-size:46px;

font-weight:900;

line-height:1;

margin-bottom:14px;

color:#fff;

}

.bar{

width:100%;

height:14px;

background:
rgba(255,255,255,.08);

border-radius:40px;

overflow:hidden;

}

.fill{

height:100%;

border-radius:40px;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

transition:width .8s ease;

}

.label{

margin-top:10px;

font-size:11px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

opacity:.65;

color:#fff;

}

/* MENU */

.menu{

display:flex;

gap:10px;

overflow-x:auto;

padding-bottom:10px;

margin-bottom:10px;

position:relative;

z-index:2;

scrollbar-width:none;

}

.menu::-webkit-scrollbar{
display:none;
}

.menu button{

flex:none;

border:none;

cursor:pointer;

padding:10px 16px;

border-radius:14px;

font-size:13px;

font-weight:800;

background:
rgba(255,255,255,.08);

color:#fff;

transition:.2s;

}

.menu button:hover{

background:
rgba(255,255,255,.16);

}

/* MODAL */

.modal{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:
rgba(2,8,23,.82);

backdrop-filter:blur(12px);

display:none;

align-items:center;

justify-content:center;

padding:20px;

z-index:999;

}

.modal.active{

display:flex;

}

.modal-box{

width:100%;

max-width:1200px;

max-height:90vh;

overflow:auto;

border-radius:28px;

padding:24px;

background:
linear-gradient(
135deg,
#071d46 0%,
#0d3f8f 100%
);

border:
1px solid rgba(255,255,255,.08);

box-shadow:
0 20px 60px rgba(0,0,0,.45);

}

.modal-header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:24px;

}

.modal-header h2{

font-size:34px;

font-weight:900;

color:#fff;

}

.modal-header button{

border:none;

width:42px;
height:42px;

cursor:pointer;

border-radius:50%;

font-size:18px;

font-weight:900;

background:
rgba(255,255,255,.08);

color:#fff;

}

.modal-grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:18px;

}

/* MOBILE */

@media(max-width:1100px){

.grid{

grid-template-columns:
1fr 1fr;

}

}

@media(max-width:700px){

body{

overflow:auto;

}

.widget{

padding:16px;

}

.header{

flex-direction:column;

align-items:flex-start;

}

.title{

font-size:28px;

}

.grid{

grid-template-columns:
1fr;

}

.percentuale{

font-size:38px;

}

.modal{

padding:10px;

}

.modal-box{

padding:18px;

max-height:95vh;

}

.modal-header h2{

font-size:24px;

}

}

</style>

</head>

<body>

<div class="widget">

<!-- HEADER -->

<div class="header">

<div class="live">

<div class="dot"></div>

<div>
SCRUTINIO LIVE
</div>

</div>

<div>

<div class="title">
ELEZIONI AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- AGRIGENTO -->

<div class="grid" id="agrigento-grid">

</div>

<!-- MENU -->

<div class="menu">

<button onclick="openModal('Ribera')">
Ribera
</button>

<button onclick="openModal('Camastra')">
Camastra
</button>

<button onclick="openModal('Cammarata')">
Cammarata
</button>

<button onclick="openModal('Casteltermini')">
Casteltermini
</button>

<button onclick="openModal('Raffadali')">
Raffadali
</button>

<button onclick="openModal('Sambuca di Sicilia')">
Sambuca
</button>

<button onclick="openModal('Siculiana')">
Siculiana
</button>

<button onclick="openModal('Villafranca Sicula')">
Villafranca
</button>

</div>

<!-- MODAL -->

<div class="modal" id="modal">

<div class="modal-box">

<div class="modal-header">

<h2 id="modal-title">
Comune
</h2>

<button onclick="closeModal()">
✕
</button>

</div>

<div
class="modal-grid"
id="modal-grid">
</div>

</div>

</div>

</div>

<script>

window.comuniData = {};

async function aggiorna(){

try{

const response = await fetch(
'sindaci.json?v=' + new Date().getTime(),
{
cache:'no-store'
}
);

const data =
await response.json();

window.comuniData =
data;

/* AGRIGENTO */

const agrigento =
data["Agrigento"];

let html = '';

agrigento.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
agrigento.totale_voti > 0
?
((c.voti / agrigento.totale_voti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="top">

<img
class="foto"
src="${c.foto}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document
.getElementById('agrigento-grid')
.innerHTML =
html;

document.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}
catch(error){

console.log(error);

}

}

function openModal(nomeComune){

const modal =
document.getElementById('modal');

const modalTitle =
document.getElementById('modal-title');

const modalGrid =
document.getElementById('modal-grid');

modalTitle.innerText =
nomeComune;

const comune =
window.comuniData[nomeComune];

let html = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
comune.totale_voti > 0
?
((c.voti/comune.totale_voti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

modalGrid.innerHTML =
html;

modal.classList.add('active');

}

function closeModal(){

document
.getElementById('modal')
.classList.remove('active');

}

aggiorna();

setInterval(aggiorna,3000);

</script>

</body>
</html>
