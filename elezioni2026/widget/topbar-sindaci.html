<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Election Night Live</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

margin:0;

font-family:'Inter',sans-serif;

background:transparent;

overflow:hidden;

}

/* BACKGROUND */

.topbar{

position:relative;

width:100%;

padding:20px;

overflow:hidden;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

border-top:
4px solid #19ff9c;

box-shadow:
0 10px 40px rgba(0,0,0,.35);

}

/* GLOW */

.topbar::before{

content:'';

position:absolute;

top:-120px;
right:-120px;

width:320px;
height:320px;

background:
radial-gradient(
circle,
rgba(0,255,170,.18),
transparent 70%
);

filter:blur(20px);

animation:float 6s infinite ease-in-out;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(20px);
}

100%{
transform:translateY(0px);
}

}

/* HEADER */

.header{

display:flex;

align-items:center;

justify-content:space-between;

gap:20px;

margin-bottom:20px;

position:relative;

z-index:2;

}

/* LIVE */

.live{

display:flex;

align-items:center;

gap:10px;

padding:10px 18px;

border-radius:50px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(10px);

border:
1px solid rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

letter-spacing:1px;

color:#fff;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

box-shadow:
0 0 12px rgba(255,49,49,.9);

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:.4;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* TITLE */

.title{

font-size:34px;

font-weight:900;

letter-spacing:-1px;

color:#fff;

text-shadow:
0 4px 12px rgba(0,0,0,.25);

}

/* UPDATE */

.update{

font-size:12px;

font-weight:700;

color:
rgba(255,255,255,.7);

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:16px;

position:relative;

z-index:2;

}

/* CARD */

.card{

position:relative;

overflow:hidden;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border-radius:24px;

padding:18px;

transition:.25s;

box-shadow:
0 10px 25px rgba(0,0,0,.18);

}

.card:hover{

transform:
translateY(-5px);

box-shadow:
0 18px 35px rgba(0,0,0,.28);

}

/* WINNER */

.card::before{

content:'';

position:absolute;

top:0;
left:0;

width:100%;
height:4px;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

}

/* TOP */

.top{

display:flex;

align-items:center;

gap:14px;

margin-bottom:16px;

}

/* FOTO */

.foto{

width:68px;
height:68px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.18);

background:#fff;

box-shadow:
0 5px 14px rgba(0,0,0,.2);

}

/* NOME */

.nome{

font-size:15px;

font-weight:900;

line-height:1.2;

color:#fff;

}

.voti{

font-size:12px;

font-weight:700;

opacity:.7;

margin-top:5px;

color:#fff;

}

/* PERCENTUALE */

.percentuale{

font-size:46px;

font-weight:900;

line-height:1;

margin-bottom:14px;

color:#fff;

text-shadow:
0 4px 14px rgba(0,0,0,.25);

}

/* BAR */

.bar{

width:100%;

height:14px;

background:
rgba(255,255,255,.08);

border-radius:40px;

overflow:hidden;

position:relative;

}

/* FILL */

.fill{

height:100%;

border-radius:40px;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

box-shadow:
0 0 20px rgba(66,211,255,.45);

transition:width .8s ease;

}

/* LABEL */

.label{

margin-top:10px;

font-size:11px;

font-weight:700;

letter-spacing:1px;

text-transform:uppercase;

opacity:.65;

color:#fff;

}

/* MOBILE */

@media(max-width:1100px){

body{
overflow:auto;
}

.grid{

grid-template-columns:
1fr 1fr;

}

.title{
font-size:28px;
}

}

@media(max-width:650px){

.grid{

grid-template-columns:
1fr;

}

.header{

flex-direction:column;

align-items:flex-start;

gap:10px;

}

.title{

font-size:22px;

}

.percentuale{

font-size:40px;

}

}

</style>

</head>

<body>

<div class="topbar">

<!-- HEADER -->

<div class="header">

<div class="live">

<div class="dot"></div>

<div>
SCRUTINIO LIVE
</div>

</div>

<div>

<div class="title">
ELEZIONI AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento in tempo reale
</div>

</div>

</div>

<!-- GRID -->

<div class="grid" id="grid">

</div>

</div>

<script>

async function aggiorna(){

try{

const response = await fetch(

'sindaci.json?v=' + new Date().getTime(),

{
cache:'no-store'
}

);

const data = await response.json();

const totale =
data.totale_voti;

let html = '';

/* ORDINA */

data.candidati.sort(
(a,b) => b.voti - a.voti
);

data.candidati.forEach(c => {

const percentuale =
((c.voti / totale) * 100)
.toFixed(2);

html += `

<div class="card">

<div class="top">

<img
class="foto"
src="${c.foto}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
Proiezione live
</div>

</div>

`;

});

document.getElementById('grid')
.innerHTML =
html;

document.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}
catch(error){

console.log(error);

}

}

aggiorna();

setInterval(aggiorna,3000);

</script>

</body>
</html>
