<!--
WIDGET RESPONSIVE COMPLETO
- Agrigento fisso in alto
- Gli altri comuni si aprono al click
- Responsive mobile
- Perfetto per iframe WordPress
-->

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:transparent;

overflow:hidden;

}

.widget{

width:100%;

padding:20px;

border-radius:0;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

overflow:hidden;

position:relative;

}

/* HEADER */

.header{

display:flex;

justify-content:space-between;

align-items:flex-start;

gap:20px;

margin-bottom:20px;

}

.live{

display:flex;

align-items:center;

gap:10px;

padding:10px 18px;

border-radius:999px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

color:#fff;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.4);
}

100%{
transform:scale(1);
}

}

.title{

font-size:42px;

font-weight:900;

color:#fff;

line-height:1;

}

.update{

font-size:12px;

font-weight:700;

color:
rgba(255,255,255,.7);

margin-top:8px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:16px;

margin-bottom:20px;

}

/* CARD */

.card{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

border-top:
4px solid #42ffd0;

border-radius:26px;

padding:18px;

backdrop-filter:blur(10px);

color:#fff;

}

.top{

display:flex;

align-items:center;

gap:14px;

margin-bottom:18px;

}

.foto{

width:70px;
height:70px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.18);

}

.nome{

font-size:15px;

font-weight:900;

}

.voti{

font-size:12px;

font-weight:700;

opacity:.7;

margin-top:5px;

}

.percentuale{

font-size:46px;

font-weight:900;

margin-bottom:14px;

}

.bar{

width:100%;

height:14px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#2cff9a,
#42d3ff
);

}

.label{

margin-top:10px;

font-size:11px;

font-weight:700;

letter-spacing:1px;

opacity:.7;

}

/* MENU */

.menu{

display:flex;

gap:10px;

overflow-x:auto;

padding-bottom:10px;

margin-bottom:20px;

scrollbar-width:none;

}

.menu::-webkit-scrollbar{
display:none;
}

.menu button{

flex:none;

border:none;

cursor:pointer;

padding:10px 16px;

border-radius:14px;

font-size:13px;

font-weight:800;

background:
rgba(255,255,255,.08);

color:#fff;

transition:.2s;

}

.menu button.active{

background:
linear-gradient(
90deg,
#2cff9a,
#42d3ff
);

color:#02111f;

}

/* COMUNI */

.comune{

display:none;

grid-template-columns:
repeat(4,1fr);

gap:16px;

animation:fade .25s ease;

}

.comune.active{

display:grid;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* MOBILE */

@media(max-width:1100px){

.grid,
.comune{

grid-template-columns:
1fr 1fr;

}

}

@media(max-width:700px){

body{

overflow:auto;

}

.widget{

padding:16px;

}

.header{

flex-direction:column;

align-items:flex-start;

}

.title{

font-size:28px;

}

.grid,
.comune{

grid-template-columns:
1fr;

}

.percentuale{

font-size:38px;

}

.card{

padding:16px;

}

.menu{

padding-bottom:14px;

}

}

</style>

<div class="widget">

<!-- HEADER -->

<div class="header">

<div class="live">

<div class="dot"></div>

SCRUTINIO LIVE

</div>

<div>

<div class="title">
ELEZIONI AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornato adesso
</div>

</div>

</div>

<!-- AGRIGENTO -->

<div class="grid" id="agrigento-grid">

</div>

<!-- MENU -->

<div class="menu">

<button
class="active"
onclick="openComune(event,'ribera')">
Ribera
</button>

<button
onclick="openComune(event,'camastra')">
Camastra
</button>

<button
onclick="openComune(event,'cammarata')">
Cammarata
</button>

<button
onclick="openComune(event,'casteltermini')">
Casteltermini
</button>

<button
onclick="openComune(event,'raffadali')">
Raffadali
</button>

<button
onclick="openComune(event,'sambuca')">
Sambuca
</button>

<button
onclick="openComune(event,'siculiana')">
Siculiana
</button>

<button
onclick="openComune(event,'villafranca')">
Villafranca
</button>

</div>

<!-- COMUNI -->

<div class="comune active" id="ribera"></div>
<div class="comune" id="camastra"></div>
<div class="comune" id="cammarata"></div>
<div class="comune" id="casteltermini"></div>
<div class="comune" id="raffadali"></div>
<div class="comune" id="sambuca"></div>
<div class="comune" id="siculiana"></div>
<div class="comune" id="villafranca"></div>

</div>

<script>

async function aggiorna(){

const response = await fetch(
'sindaci.json?v=' + new Date().getTime()
);

const data =
await response.json();

/* AGRIGENTO */

const agrigento =
data["Agrigento"];

let html = '';

agrigento.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
agrigento.totale_voti > 0
?
((c.voti / agrigento.totale_voti)*100).toFixed(2)
:
0;

html += `

<div class="card">

<div class="top">

<img
class="foto"
src="${c.foto}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document
.getElementById('agrigento-grid')
.innerHTML =
html;

/* COMUNI */

const mapping = {

ribera:"Ribera",
camastra:"Camastra",
cammarata:"Cammarata",
casteltermini:"Casteltermini",
raffadali:"Raffadali",
sambuca:"Sambuca di Sicilia",
siculiana:"Siculiana",
villafranca:"Villafranca Sicula"

};

for(const id in mapping){

const comune =
data[mapping[id]];

let comuneHtml = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach(c=>{

const percentuale =
comune.totale_voti > 0
?
((c.voti/comune.totale_voti)*100).toFixed(2)
:
0;

comuneHtml += `

<div class="card">

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

</div>

`;

});

document
.getElementById(id)
.innerHTML =
comuneHtml;

}

document
.getElementById('update')
.innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}

function openComune(evt,id){

document
.querySelectorAll('.comune')
.forEach(c=>
c.classList.remove('active')
);

document
.querySelectorAll('.menu button')
.forEach(b=>
b.classList.remove('active')
);

document
.getElementById(id)
.classList.add('active');

evt.currentTarget
.classList.add('active');

}

aggiorna();

setInterval(aggiorna,3000);

</script>
