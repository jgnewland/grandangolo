<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Topbar Elezioni</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

margin:0;

font-family:
Arial, Helvetica, sans-serif;

background:transparent;

overflow:hidden;

}

/* TOPBAR */

.topbar{

width:100%;

background:
linear-gradient(
90deg,
#031226 0%,
#0d3f8f 55%,
#1d63d8 100%
);

color:#fff;

border-top:
3px solid #16ff90;

padding:14px 18px 10px 18px;

overflow:hidden;

}

/* ROW */

.row{

display:flex;

align-items:center;

justify-content:space-between;

gap:18px;

}

/* LIVE */

.live{

display:flex;

align-items:center;

gap:8px;

padding:8px 14px;

border-radius:40px;

background:
rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

letter-spacing:1px;

white-space:nowrap;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff2a2a;

animation:pulse 1s infinite;

box-shadow:
0 0 10px rgba(255,0,0,.8);

}

@keyframes pulse{

0%{
transform:scale(1);
opacity:1;
}

50%{
transform:scale(1.5);
opacity:.35;
}

100%{
transform:scale(1);
opacity:1;
}

}

/* CENTER */

.center{

display:flex;

align-items:center;

gap:18px;

flex:1;

overflow:hidden;

}

/* TEXT */

.info{

display:flex;

flex-direction:column;

gap:4px;

}

.title{

font-size:11px;

font-weight:800;

letter-spacing:1px;

opacity:.7;

text-transform:uppercase;

line-height:1.2;

}

.subtitle{

font-size:16px;

font-weight:700;

line-height:1.2;

}

/* BIG */

.big-wrap{

display:flex;

flex-direction:column;

gap:4px;

}

.big{

font-size:54px;

font-weight:900;

line-height:1;

white-space:nowrap;

text-shadow:
0 4px 14px rgba(0,0,0,.25);

}

.big-label{

font-size:11px;

font-weight:700;

opacity:.75;

text-transform:uppercase;

}

/* HOURS */

.hours{

display:flex;

gap:10px;

}

.hour{

background:
rgba(255,255,255,.08);

padding:10px 12px;

border-radius:14px;

min-width:82px;

text-align:center;

}

.hour small{

display:block;

font-size:10px;

opacity:.7;

margin-bottom:4px;

}

.hour strong{

font-size:18px;

font-weight:900;

}

/* TICKER */

.ticker{

margin-top:10px;

padding-top:8px;

border-top:
1px solid rgba(255,255,255,.08);

overflow:hidden;

position:relative;

width:100%;

}

.ticker-track{

display:inline-flex;

align-items:center;

gap:35px;

white-space:nowrap;

padding-left:100%;

animation:tickerScroll 18s linear infinite;

font-size:13px;

font-weight:700;

min-width:max-content;

}

@keyframes tickerScroll{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-100%);
}

}

/* MOBILE */

@media(max-width:768px){

.topbar{

padding:12px 10px;

}

.row{

flex-direction:column;

align-items:center;

justify-content:center;

gap:12px;

text-align:center;

}

.center{

width:100%;

flex-direction:column;

justify-content:center;

align-items:center;

gap:8px;

}

.title{

font-size:10px;

text-align:center;

}

.subtitle{

font-size:14px;

text-align:center;

}

.big{

font-size:42px;

}

.hours{

width:100%;

display:grid;

grid-template-columns:
1fr 1fr;

gap:8px;

}

.hour{

min-width:auto;

padding:8px 6px;

}

.hour small{

font-size:9px;

}

.hour strong{

font-size:15px;

}

.live{

font-size:10px;

padding:7px 10px;

}

.ticker-track{

font-size:11px;

gap:20px;

}

}

</style>

</head>

<body>

<div class="topbar">

<div class="row">

<!-- LIVE -->

<div class="live">

<div class="dot"></div>

<div>
LIVE 2026
</div>

</div>

<!-- CENTER -->

<div class="center">

<div class="info">

<div class="title">
ELEZIONI AMMINISTRATIVE AGRIGENTO
</div>

<div class="subtitle">
Affluenza Comune di Agrigento
</div>

</div>

<div class="big-wrap">

<div class="big" id="agrigento">
47,20%
</div>

<div class="big-label" id="bigLabel">
ULTIMO DATO • ORE 23
</div>

</div>

</div>

<!-- HOURS -->

<div class="hours">

<div class="hour">

<small>
ORE 12
</small>

<strong id="ore12">
13,85%
</strong>

</div>

<div class="hour">

<small>
ORE 19
</small>

<strong id="ore19">
36,53%
</strong>

</div>

<div class="hour">

<small>
ORE 23
</small>

<strong id="ore23">
47,20%
</strong>

</div>

<div class="hour">

<small>
ORE 15 OGGI
</small>

<strong id="ore15">
00,00%
</strong>

</div>

</div>

</div>

<!-- TICKER -->

<div class="ticker">

<div class="ticker-track" id="ticker">

● AGRIGENTO 47,20%
● CAMASTRA 42,70%

</div>

</div>

</div>

<script>

async function aggiornaDati(){

try{

const response = await fetch(

'dati.json?v=' + new Date().getTime(),

{
method:'GET',

headers:{
'Cache-Control':'no-cache'
}

}

);

const data = await response.json();

/* PRIORITÀ */

let ultimoDato =
data.agrigento["12"];

let ultimaOra =
"ORE 12";

if(
data.agrigento["15oggi"] &&
data.agrigento["15oggi"] !== "00,00"
){

ultimoDato =
data.agrigento["15oggi"];

ultimaOra =
"ORE 15";

}
else if(
data.agrigento["23"] &&
data.agrigento["23"] !== "00,00"
){

ultimoDato =
data.agrigento["23"];

ultimaOra =
"ORE 23";

}
else if(
data.agrigento["19"] &&
data.agrigento["19"] !== "00,00"
){

ultimoDato =
data.agrigento["19"];

ultimaOra =
"ORE 19";

}

/* BIG */

document.getElementById('agrigento')
.innerText =
ultimoDato + '%';

document.getElementById('bigLabel')
.innerText =
'ULTIMO DATO • ' + ultimaOra;

/* HOURS */

document.getElementById('ore12')
.innerText =
data.agrigento["12"] + '%';

document.getElementById('ore19')
.innerText =
data.agrigento["19"] + '%';

document.getElementById('ore23')
.innerText =
data.agrigento["23"] + '%';

document.getElementById('ore15')
.innerText =
data.agrigento["15oggi"] + '%';

/* TICKER */

let tickerText = '';

Object.entries(data).forEach(([nome,dati]) => {

let valore =
dati["12"];

let ora =
"12";

if(
dati["15oggi"] &&
dati["15oggi"] !== "00,00"
){

valore =
dati["15oggi"];

ora =
"15";

}
else if(
dati["23"] &&
dati["23"] !== "00,00"
){

valore =
dati["23"];

ora =
"23";

}
else if(
dati["19"] &&
dati["19"] !== "00,00"
){

valore =
dati["19"];

ora =
"19";

}

tickerText +=
`● ${nome.toUpperCase()} ${valore}% (ORE ${ora}) `;

});

document.getElementById('ticker')
.innerHTML =
tickerText + tickerText;

}
catch(error){

console.log(error);

}

}

aggiornaDati();

setInterval(aggiornaDati,3000);

</script>

</body>
</html>
