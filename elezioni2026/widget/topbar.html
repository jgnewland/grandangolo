
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affluenza Agrigento 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:transparent;
overflow:hidden;
}

.topbar{
width:100%;
background:linear-gradient(
90deg,
#031226 0%,
#0d3f8f 55%,
#1d63d8 100%
);
color:#fff;
border-top:3px solid #16ff90;
padding:12px 18px;
}

/* LAYOUT */

.row{
display:flex;
align-items:center;
gap:18px;
}

/* LIVE */

.live{
display:flex;
align-items:center;
gap:8px;
padding:8px 14px;
border-radius:40px;
background:rgba(255,255,255,.08);
font-size:12px;
font-weight:900;
letter-spacing:1px;
white-space:nowrap;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#ff2a2a;
animation:pulse 1s infinite;
box-shadow:0 0 10px rgba(255,0,0,.8);
}

@keyframes pulse{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.4);
opacity:.4;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* DATO PRINCIPALE */

.main-value{
display:flex;
flex-direction:column;
justify-content:center;
min-width:220px;
}

.city{
font-size:11px;
font-weight:800;
letter-spacing:1px;
opacity:.7;
text-transform:uppercase;
margin-bottom:2px;
}

.big{
font-size:58px;
font-weight:900;
line-height:1;
text-shadow:0 4px 14px rgba(0,0,0,.25);
}

.big-label{
font-size:11px;
font-weight:700;
opacity:.8;
text-transform:uppercase;
margin-top:2px;
}

/* BOX ORARI */

.hours{
display:flex;
gap:8px;
flex:1;
}

.hour{
background:rgba(255,255,255,.08);
border-radius:10px;
padding:10px 14px;
text-align:center;
min-width:95px;
display:flex;
flex-direction:column;
justify-content:center;
}

.hour small{
display:block;
font-size:10px;
font-weight:700;
opacity:.75;
margin-bottom:4px;
text-transform:uppercase;
}

.hour strong{
font-size:18px;
font-weight:900;
}

.current{
background:rgba(22,255,144,.15);
border:1px solid rgba(22,255,144,.40);
}

/* MOBILE */

@media(max-width:768px){

.row{
flex-direction:column;
align-items:stretch;
gap:10px;
}

.main-value{
min-width:auto;
text-align:center;
}

.big{
font-size:44px;
}

.hours{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.hour{
min-width:auto;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="row">

<!-- LIVE -->

<div class="live">
<div class="dot"></div>
<div>LIVE BALLOTTAGGIO</div>
</div>

<!-- DATO PRINCIPALE -->

<div class="main-value">

<div class="city">
AGRIGENTO
</div>

<div class="big" id="agrigento">
47,20%
</div>

<div class="big-label" id="bigLabel">
ULTIMO DATO AGGIORNATO • ORE 23
</div>

</div>

<!-- ORARI -->

<div class="hours">

<div class="hour">
<small>ORE 12</small>
<strong id="ore12">13,85%</strong>
</div>

<div class="hour">
<small>ORE 19</small>
<strong id="ore19">36,53%</strong>
</div>

<div class="hour">
<small>ORE 23</small>
<strong id="ore23">47,20%</strong>
</div>

<div class="hour current">
<small>8 GIU • ORE 15</small>
<strong id="ore15">0,00%</strong>
</div>

</div>

</div>

</div>

<script>

async function aggiornaDati(){

try{

const response = await fetch(
'dati.json?v=' + Date.now(),
{
cache:'no-store'
}
);

const data = await response.json();

let ultimoDato = data.agrigento["12"];
let ultimaOra = "ORE 12";

if(
data.agrigento["15oggi"] &&
data.agrigento["15oggi"] !== "00,00"
){
ultimoDato = data.agrigento["15oggi"];
ultimaOra = "ORE 15 • 8 GIUGNO 2026";
}
else if(
data.agrigento["23"] &&
data.agrigento["23"] !== "00,00"
){
ultimoDato = data.agrigento["23"];
ultimaOra = "ORE 23";
}
else if(
data.agrigento["19"] &&
data.agrigento["19"] !== "00,00"
){
ultimoDato = data.agrigento["19"];
ultimaOra = "ORE 19";
}

document.getElementById("agrigento").innerText =
ultimoDato + "%";

document.getElementById("bigLabel").innerText =
"ULTIMO DATO • " + ultimaOra;

document.getElementById("ore12").innerText =
data.agrigento["12"] + "%";

document.getElementById("ore19").innerText =
data.agrigento["19"] + "%";

document.getElementById("ore23").innerText =
data.agrigento["23"] + "%";

document.getElementById("ore15").innerText =
data.agrigento["15oggi"] + "%";

}
catch(error){

console.log(error);

}

}

aggiornaDati();

setInterval(
aggiornaDati,
60000
);

</script>

</body>
</html>
