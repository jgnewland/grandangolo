<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Topbar Elezioni</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:transparent;
overflow:hidden;
}

/* TOPBAR */

.topbar{

width:100%;

display:flex;

align-items:center;

justify-content:space-between;

gap:18px;

padding:14px 20px;

background:
linear-gradient(
90deg,
#031226 0%,
#0d3f8f 55%,
#1d63d8 100%
);

color:#fff;

border-top:
3px solid #16ff90;

overflow:hidden;

}

/* LIVE */

.live{

display:flex;

align-items:center;

gap:8px;

font-size:11px;

font-weight:900;

letter-spacing:1px;

padding:8px 12px;

border-radius:30px;

background:
rgba(255,255,255,0.08);

white-space:nowrap;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff2a2a;

animation:pulse 1s infinite;

box-shadow:
0 0 10px rgba(255,0,0,0.8);

}

@keyframes pulse{

0%{
opacity:1;
transform:scale(1);
}

50%{
opacity:0.35;
transform:scale(1.4);
}

100%{
opacity:1;
transform:scale(1);
}

}

/* CENTER */

.center{

display:flex;

align-items:center;

gap:18px;

flex:1;

overflow:hidden;

}

.info{

display:flex;

flex-direction:column;

gap:3px;

white-space:nowrap;

}

.title{

font-size:11px;

font-weight:800;

letter-spacing:1px;

opacity:0.75;

text-transform:uppercase;

}

.subtitle{

font-size:14px;

font-weight:700;

}

/* BIG */

.big{

font-size:42px;

font-weight:900;

line-height:1;

white-space:nowrap;

text-shadow:
0 4px 14px rgba(0,0,0,0.25);

}

/* HOURS */

.hours{

display:flex;

align-items:center;

gap:8px;

}

.hour{

background:
rgba(255,255,255,0.08);

padding:8px 10px;

border-radius:12px;

text-align:center;

min-width:72px;

}

.hour small{

display:block;

font-size:9px;

opacity:0.7;

margin-bottom:3px;

text-transform:uppercase;

}

.hour strong{

font-size:15px;

font-weight:900;

}

/* MOBILE */

@media(max-width:900px){

.topbar{

flex-wrap:wrap;

justify-content:center;

padding:12px;

gap:12px;

}

.center{

width:100%;

justify-content:center;

text-align:center;

}

.hours{

width:100%;

justify-content:center;

flex-wrap:wrap;

}

.big{
font-size:34px;
}

}

@media(max-width:600px){

.subtitle{
font-size:12px;
}

.big{
font-size:28px;
}

.hour{
min-width:65px;
}

.hour strong{
font-size:13px;
}

.live{
font-size:10px;
padding:7px 10px;
}

}

</style>

</head>

<body>

<div class="topbar">

<!-- LIVE -->

<div class="live">

<div class="dot"></div>

<div>
LIVE 2026
</div>

</div>

<!-- CENTER -->

<div class="center">

<div class="info">

<div class="title">
ELEZIONI AMMINISTRATIVE AGRIGENTO
</div>

<div class="subtitle">
Affluenza Comune di Agrigento
</div>

</div>

<div class="big" id="agrigento">
13,85%
</div>

</div>

<!-- HOURS -->

<div class="hours">

<div class="hour">

<small>
ORE 12
</small>

<strong id="ore12">
13,85%
</strong>

</div>

<div class="hour">

<small>
ORE 19
</small>

<strong id="ore19">
00,00%
</strong>

</div>

<div class="hour">

<small>
ORE 23
</small>

<strong id="ore23">
00,00%
</strong>

</div>

</div>

</div>

<script>

async function aggiornaDati(){

try{

const response = await fetch(
'dati.json?t=' + Date.now(),
{
cache:'no-store'
}
);

const data = await response.json();

document.getElementById('agrigento')
.innerText =
data.agrigento["12"] + '%';

document.getElementById('ore12')
.innerText =
data.agrigento["12"] + '%';

document.getElementById('ore19')
.innerText =
data.agrigento["19"] + '%';

document.getElementById('ore23')
.innerText =
data.agrigento["23"] + '%';

}
catch(error){

console.log(error);

}

}

aggiornaDati();

setInterval(aggiornaDati,10000);

</script>

</body>
</html>
