<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Topbar Elezioni</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:transparent;
overflow:hidden;
}

.topbar{
width:100%;
background:linear-gradient(
90deg,
#031226 0%,
#0d3f8f 55%,
#1d63d8 100%
);
color:#fff;
border-top:3px solid #16ff90;
padding:12px 18px;
}

.row{
display:flex;
align-items:center;
gap:20px;
}

/* LIVE */

.live{
display:flex;
align-items:center;
gap:8px;
padding:8px 14px;
border-radius:40px;
background:rgba(255,255,255,.08);
font-size:12px;
font-weight:900;
letter-spacing:1px;
white-space:nowrap;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#ff2a2a;
animation:pulse 1s infinite;
box-shadow:0 0 10px rgba(255,0,0,.8);
}

@keyframes pulse{
0%{
transform:scale(1);
opacity:1;
}
50%{
transform:scale(1.4);
opacity:.4;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* CENTRO */

.center{
display:flex;
align-items:center;
gap:20px;
flex:1;
min-width:0;
}

.info{
min-width:240px;
}

.title{
font-size:11px;
font-weight:800;
letter-spacing:1px;
opacity:.7;
text-transform:uppercase;
margin-bottom:4px;
}

.subtitle{
font-size:16px;
font-weight:700;
}

.big-wrap{
min-width:170px;
}

.big{
font-size:48px;
font-weight:900;
line-height:1;
text-shadow:0 4px 14px rgba(0,0,0,.25);
}

.big-label{
font-size:11px;
font-weight:700;
opacity:.75;
margin-top:4px;
text-transform:uppercase;
}

/* BARRE */

.bars{
flex:1;
display:flex;
flex-direction:column;
gap:8px;
min-width:260px;
}

.bar-row{
display:flex;
align-items:center;
gap:10px;
}

.bar-label{
width:70px;
font-size:11px;
font-weight:800;
opacity:.9;
text-transform:uppercase;
}

.bar-track{
flex:1;
height:12px;
background:rgba(255,255,255,.15);
border-radius:999px;
overflow:hidden;
}

```css
.bar-fill{
height:100%;
width:0%;
border-radius:999px;
transition:width .8s ease;
}

/* ORE 12 */

#bar12{
background:linear-gradient(
90deg,
#6ec1ff,
#a8ddff
);
}

/* ORE 19 */

#bar19{
background:linear-gradient(
90deg,
#2f7cff,
#69a6ff
);
}

/* ORE 23 */

#bar23{
background:linear-gradient(
90deg,
#ff9a2f,
#ffc067
);
}

/* 8 GIUGNO */

#bar15{
background:linear-gradient(
90deg,
#16ff90,
#5effb8
);
box-shadow:0 0 12px rgba(22,255,144,.45);
}
```


/* MOBILE */

@media(max-width:768px){

.topbar{
padding:10px;
}

.row{
flex-direction:column;
align-items:stretch;
gap:10px;
}

.center{
flex-direction:column;
align-items:center;
text-align:center;
}

.info{
min-width:auto;
}

.big{
font-size:42px;
}

.bars{
width:100%;
min-width:auto;
}

.bar-label{
width:60px;
font-size:10px;
}

.bar-value{
width:55px;
font-size:12px;
}

}

</style>
</head>

<body>

<div class="topbar">

<div class="row">

<div class="live">
<div class="dot"></div>
<div>LIVE 2026</div>
</div>

<div class="center">

<div class="info">
<div class="title">
ELEZIONI AMMINISTRATIVE AGRIGENTO
</div>

<div class="subtitle">
Affluenza Comune di Agrigento
</div>
</div>

<div class="big-wrap">
<div class="big" id="agrigento">
47,20%
</div>

<div class="big-label" id="bigLabel">
ULTIMO DATO • ORE 23
</div>
</div>

<div class="bars">

<div class="bar-row">
<div class="bar-label">ORE 12</div>

<div class="bar-track">
<div class="bar-fill" id="bar12"></div>
</div>

<div class="bar-value" id="ore12">
13,85%
</div>
</div>

<div class="bar-row">
<div class="bar-label">ORE 19</div>

<div class="bar-track">
<div class="bar-fill" id="bar19"></div>
</div>

<div class="bar-value" id="ore19">
36,53%
</div>
</div>

<div class="bar-row">
<div class="bar-label">ORE 23</div>

<div class="bar-track">
<div class="bar-fill" id="bar23"></div>
</div>

<div class="bar-value" id="ore23">
47,20%
</div>
</div>

<div class="bar-row">
<div class="bar-label">8 GIU 15</div>

<div class="bar-track">
<div class="bar-fill current" id="bar15"></div>
</div>

<div class="bar-value" id="ore15">
0,00%
</div>
</div>

</div>

</div>

</div>

</div>

<script>

function percentToWidth(value){

if(!value) return "0%";

return parseFloat(
String(value).replace(",", ".")
) + "%";

}

async function aggiornaDati(){

try{

const response = await fetch(
'dati.json?v=' + Date.now(),
{
cache:'no-store'
}
);

const data = await response.json();

let ultimoDato =
data.agrigento["12"];

let ultimaOra =
"ORE 12";

if(
data.agrigento["15oggi"] &&
data.agrigento["15oggi"] !== "00,00"
){

ultimoDato =
data.agrigento["15oggi"];

ultimaOra =
"ORE 15 • 8 GIUGNO 2026";

}
else if(
data.agrigento["23"] &&
data.agrigento["23"] !== "00,00"
){

ultimoDato =
data.agrigento["23"];

ultimaOra =
"ORE 23";

}
else if(
data.agrigento["19"] &&
data.agrigento["19"] !== "00,00"
){

ultimoDato =
data.agrigento["19"];

ultimaOra =
"ORE 19";

}

document.getElementById("agrigento").innerText =
ultimoDato + "%";

document.getElementById("bigLabel").innerText =
"ULTIMO DATO • " + ultimaOra;

/* TESTI */

document.getElementById("ore12").innerText =
data.agrigento["12"] + "%";

document.getElementById("ore19").innerText =
data.agrigento["19"] + "%";

document.getElementById("ore23").innerText =
data.agrigento["23"] + "%";

document.getElementById("ore15").innerText =
data.agrigento["15oggi"] + "%";

/* BARRE */

document.getElementById("bar12").style.width =
percentToWidth(data.agrigento["12"]);

document.getElementById("bar19").style.width =
percentToWidth(data.agrigento["19"]);

document.getElementById("bar23").style.width =
percentToWidth(data.agrigento["23"]);

document.getElementById("bar15").style.width =
percentToWidth(data.agrigento["15oggi"]);

}
catch(error){

console.log(error);

}

}

aggiornaDati();

setInterval(
aggiornaDati,
60000
);

</script>

</body>
</html>
