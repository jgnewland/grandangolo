<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Affluenza Agrigento</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:transparent;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

.widget{

width:100%;
max-width:760px;

margin:0 auto;

overflow:hidden;

border-radius:12px;

background:
linear-gradient(
135deg,
#06152f 0%,
#0b3d91 50%,
#1e63d6 100%
);

box-shadow:
0 8px 24px rgba(0,0,0,0.18);

color:#fff;

}

/* HEADER */

.left{

padding:18px 20px;

border-bottom:
1px solid rgba(255,255,255,0.12);

text-align:center;

}

.small{

font-size:11px;

text-transform:uppercase;

letter-spacing:2px;

opacity:0.7;

margin-bottom:8px;

}

.title{

font-size:30px;

font-weight:800;

line-height:1;

margin-bottom:8px;

}

.city{

font-size:18px;

font-weight:600;

opacity:0.92;

}

/* CONTENUTO */

.right{

display:flex;

justify-content:space-around;

align-items:center;

text-align:center;

padding:14px 0;

}

.box{

flex:1;

padding:0 10px;

}

.hour{

font-size:13px;

text-transform:uppercase;

letter-spacing:1px;

opacity:0.75;

margin-bottom:10px;

}

.value{

font-size:52px;

font-weight:800;

line-height:1;

text-shadow:
0 3px 10px rgba(0,0,0,0.25);

}

.percent{

margin-top:6px;

font-size:12px;

opacity:0.7;

}

.divider{

width:1px;

height:70px;

background:
rgba(255,255,255,0.15);

}

/* MOBILE */

@media(max-width:700px){

.right{

flex-direction:column;

padding:0;

}

.box{

width:100%;

padding:20px;

}

.divider{

width:100%;

height:1px;

}

.value{

font-size:44px;

}

.title{

font-size:26px;

}

.city{

font-size:16px;

}

}

</style>

</head>

<body>

<div class="widget">

<!-- HEADER -->

<div class="left">

<div class="small">
ELEZIONI COMUNALI
</div>

<div class="title">
Affluenza
</div>

<div class="city">
Agrigento
</div>

</div>

<!-- DATI -->

<div class="right">

<!-- ORE 12 -->

<div class="box">

<div class="hour">
Ore 12
</div>

<div class="value" id="ore12">
--,-
</div>

<div class="percent">
%
</div>

</div>

<div class="divider"></div>

<!-- ORE 19 -->

<div class="box">

<div class="hour">
Ore 19
</div>

<div class="value" id="ore19">
--,-
</div>

<div class="percent">
%
</div>

</div>

<div class="divider"></div>

<!-- ORE 23 -->

<div class="box">

<div class="hour">
Ore 23
</div>

<div class="value" id="ore23">
--,-
</div>

<div class="percent">
%
</div>

</div>

</div>

</div>

<script>

async function aggiornaDati() {

try {

const response = await fetch(
'dati.json?t=' + Date.now(),
{
cache:'no-store'
}
);

const data = await response.json();

document.getElementById('ore12').innerText =
data.ore12;

document.getElementById('ore19').innerText =
data.ore19;

document.getElementById('ore23').innerText =
data.ore23;

}
catch(error){

console.log(error);

}

}

aggiornaDati();

setInterval(aggiornaDati,10000);

</script>

</body>
</html>
