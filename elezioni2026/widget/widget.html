<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:transparent;
  overflow:hidden;
}

.affluenza-container{
  width:100%;
  max-width:760px;
  height:110px;
  background:#ffffff;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:15px 25px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.aff-left{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:240px;
}

.aff-live{
  color:#d50000;
  font-size:12px;
  font-weight:bold;
  margin-bottom:4px;
}

.aff-title{
  font-size:20px;
  font-weight:700;
  color:#111;
  line-height:1.1;
}

.aff-city{
  font-size:13px;
  color:#666;
  margin-top:4px;
}

.aff-right{
  display:flex;
  align-items:center;
  gap:40px;
}

.aff-box{
  text-align:center;
  min-width:80px;
}

.aff-time{
  font-size:12px;
  color:#777;
  margin-bottom:4px;
}

.aff-value{
  font-size:32px;
  font-weight:700;
  color:#111;
  line-height:1;
}

</style>
</head>

<body>

<div id="widget"></div>

<script>

fetch('https://raw.githubusercontent.com/jgnewland/GRANDANGOLO/main/elezioni2026/data/affluenza.json?' + new Date().getTime())

.then(response => response.json())

.then(data => {

document.getElementById('widget').innerHTML = `

<div class="affluenza-container">

  <div class="aff-left">

    <div class="aff-live">
      ● LIVE
    </div>

    <div class="aff-title">
      Affluenza Elezioni 2026
    </div>

    <div class="aff-city">
      Comune di ${data.comune}
    </div>

  </div>

  <div class="aff-right">

    <div class="aff-box">
      <div class="aff-time">ORE 12</div>
      <div class="aff-value">${data.ore12}%</div>
    </div>

    <div class="aff-box">
      <div class="aff-time">ORE 19</div>
      <div class="aff-value">${data.ore19}%</div>
    </div>

    <div class="aff-box">
      <div class="aff-time">ORE 23</div>
      <div class="aff-value">${data.ore23}%</div>
    </div>

  </div>

</div>

`;

});

</script>

</body>
</html>
