<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Ballottaggio Agrigento 2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#07152d;
color:#fff;
}

.wrapper{
display:grid;
grid-template-columns:460px 1fr;
gap:20px;
padding:20px;
min-height:100vh;
}

.panel{
background:#0c1e3d;
border-radius:20px;
padding:20px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
font-size:28px;
margin-bottom:20px;
}

.card{
background:#132a52;
border-radius:16px;
padding:18px;
margin-bottom:16px;
}

.nome{
font-size:20px;
font-weight:900;
margin-bottom:10px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:700;
opacity:.8;
}

input[type=number]{
width:100%;
padding:14px;
font-size:28px;
font-weight:900;
border:none;
border-radius:12px;
}

.percentuale{
margin-top:12px;
font-size:22px;
font-weight:900;
color:#ffd700;
}

.sezioni{
margin-top:20px;
}

.save{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:12px;
background:#16c784;
color:#fff;
font-size:18px;
font-weight:900;
cursor:pointer;
}

.save:hover{
opacity:.9;
}

.status{
margin-top:15px;
font-weight:700;
}

iframe{
width:100%;
height:100%;
min-height:950px;
border:none;
border-radius:20px;
background:#fff;
}

.update-box{
margin-top:15px;
padding:12px;
background:rgba(255,255,255,.06);
border-radius:10px;
font-size:13px;
}

@media(max-width:1200px){

.wrapper{
grid-template-columns:1fr;
}

iframe{
min-height:700px;
}

}

</style>
</head>
<body>
<div id="loginScreen" style="
position:fixed;
inset:0;
background:#07152d;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background:#0c1e3d;
padding:30px;
border-radius:20px;
width:350px;
">

<h2 style="margin-bottom:20px">
Accesso Admin
</h2>

<input
id="user"
type="text"
placeholder="Nome utente"
style="
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
">

<input
id="pass"
type="password"
placeholder="Password"
style="
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
">

<button
id="loginBtn"
style="
width:100%;
padding:14px;
background:#16c784;
color:white;
border:none;
border-radius:10px;
font-weight:700;
cursor:pointer;
">
ENTRA
</button>

<div
id="loginError"
style="
margin-top:10px;
color:#ff6b6b;
font-size:14px;
">
</div>

</div>

</div>
<div class="wrapper">

<div class="panel">

<h1>Admin Ballottaggio</h1>

<div class="card">

<div class="nome">
MICHELE SODANO
</div>

<label>Voti</label>

<input
type="number"
id="sodano"
value="0"
>

<div
class="percentuale"
id="percSodano">
0%
</div>

</div>

<div class="card">

<div class="nome">
DINO ALONGE
</div>

<label>Voti</label>

<input
type="number"
id="alonge"
value="0"
>

<div
class="percentuale"
id="percAlonge">
0%
</div>

</div>

<div class="card sezioni">

<div class="nome">
SEZIONI SCRUTINATE
</div>

<label>Scrutinate</label>

<input
type="number"
id="sezioni"
value="0"
>

<div
style="
margin-top:10px;
font-size:18px;
font-weight:700;
">
Totali:
<span id="totali">
57
</span>
</div>

</div>

<button
class="save"
id="salva">
SALVA SU SUPABASE
</button>

<div
class="status"
id="status">
Pronto
</div>

<div
class="update-box"
id="ultimoAgg">
Ultimo aggiornamento: -
</div>

</div>

<div class="panel">

<iframe
id="preview"
src="https://grandangolosettimanale.it/elezioni2026/widget/balltopbar.html">
</iframe>

</div>

</div>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2';

const supabase =
createClient(
'https://xpfmzutnptmznadzemlh.supabase.co',
'sb_publishable_Tmn1caezI5nut_GJpMDr7Q_Qu7m7rzP'
);

let candidati = [];
let config = null;

async function carica(){

const { data:cData,error:cErr } =
await supabase
.from('ballottaggio')
.select('*')
.order('ordine');

if(cErr){
alert(cErr.message);
return;
}

const { data:cfg,error:cfgErr } =
await supabase
.from('config')
.select('*')
.single();

if(cfgErr){
alert(cfgErr.message);
return;
}

candidati = cData;
config = cfg;

const sodano =
candidati.find(c =>
c.nome.toLowerCase().includes('sodano')
);

const alonge =
candidati.find(c =>
c.nome.toLowerCase().includes('alonge')
);

document.getElementById('sodano').value =
sodano?.voti || 0;

document.getElementById('alonge').value =
alonge?.voti || 0;

document.getElementById('sezioni').value =
config.sezioni_scrutinate;

document.getElementById('totali').textContent =
config.sezioni_totali;

document.getElementById('ultimoAgg').textContent =
'Ultimo aggiornamento: ' +
(config.ultimo_aggiornamento || '-');

calcolaPercentuali();

}

function calcolaPercentuali(){

const sodano =
parseInt(
document.getElementById('sodano').value || 0
);

const alonge =
parseInt(
document.getElementById('alonge').value || 0
);

const totale =
sodano + alonge;

let p1 = 0;
let p2 = 0;

if(totale > 0){

p1 =
((sodano/totale)*100)
.toFixed(2);

p2 =
((alonge/totale)*100)
.toFixed(2);

}

document.getElementById('percSodano')
.textContent =
p1 + '%';

document.getElementById('percAlonge')
.textContent =
p2 + '%';

}

document
.getElementById('sodano')
.addEventListener(
'input',
calcolaPercentuali
);

document
.getElementById('alonge')
.addEventListener(
'input',
calcolaPercentuali
);

document
.getElementById('salva')
.addEventListener(
'click',
async ()=>{

const sodanoVoti =
parseInt(
document.getElementById('sodano').value || 0
);

const alongeVoti =
parseInt(
document.getElementById('alonge').value || 0
);

const sezioni =
parseInt(
document.getElementById('sezioni').value || 0
);

const timestamp =
new Date()
.toLocaleString('it-IT');

document
.getElementById('status')
.textContent =
'Salvataggio...';

const sodano =
candidati.find(c =>
c.nome.toLowerCase().includes('sodano')
);

const alonge =
candidati.find(c =>
c.nome.toLowerCase().includes('alonge')
);

await supabase
.from('ballottaggio')
.update({
voti:sodanoVoti
})
.eq('id',sodano.id);

await supabase
.from('ballottaggio')
.update({
voti:alongeVoti
})
.eq('id',alonge.id);

await supabase
.from('config')
.update({
sezioni_scrutinate:sezioni,
ultimo_aggiornamento:timestamp
})
.eq('id',1);

document
.getElementById('status')
.textContent =
'✓ PUBBLICATO';

document
.getElementById('ultimoAgg')
.textContent =
'Ultimo aggiornamento: ' +
timestamp;

document
.getElementById('preview')
.src =
'https://grandangolosettimanale.it/elezioni2026/widget/balltopbar.html?v='
+
Date.now();

}
);
const USERNAME = "admin";
const PASSWORD = "AG2026ELE";

document.getElementById("loginBtn")
.addEventListener("click", ()=>{

const u =
document.getElementById("user").value;

const p =
document.getElementById("pass").value;

if(
u === USERNAME &&
p === PASSWORD
){

sessionStorage.setItem(
"admin_logged",
"1"
);

document.getElementById(
"loginScreen"
).style.display = "none";

}else{

document.getElementById(
"loginError"
).textContent =
"Credenziali non valide";

}

});

if(
sessionStorage.getItem("admin_logged")
==="1"
){

document.getElementById(
"loginScreen"
).style.display="none";

}
carica();

</script>

</body>
</html>
