<!DOCTYPE html>
<html lang="it">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Elezioni Agrigento 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

color:#fff;

min-height:100vh;

padding:30px;

}

/* HEADER */

.header{

display:flex;
justify-content:space-between;
align-items:center;

margin-bottom:30px;

flex-wrap:wrap;

gap:20px;

}

.title{

font-size:48px;
font-weight:900;
line-height:1;

}

.live{

display:flex;
align-items:center;
gap:10px;

padding:10px 18px;

border-radius:999px;

background:rgba(255,255,255,.08);

font-size:12px;
font-weight:900;
letter-spacing:1px;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.update{

margin-top:10px;

font-size:13px;

opacity:.7;

}

/* SEZIONI */

.sezioni{

margin-bottom:30px;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:14px;

}

.sezione-card{

padding:18px;

border-radius:20px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(12px);

border:
1px solid rgba(255,255,255,.08);

}

.sezione-comune{

font-size:14px;
font-weight:800;

margin-bottom:10px;

}

.sezione-numeri{

font-size:28px;
font-weight:900;

}

.sezione-percentuale{

margin-top:8px;

font-size:12px;
opacity:.7;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

}

/* CARD */

.card{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

border-radius:26px;

padding:22px;

backdrop-filter:blur(14px);

position:relative;

overflow:hidden;

}

.gold{

border-top:5px solid #ffd700;

background:
linear-gradient(
135deg,
rgba(255,215,0,.16),
rgba(255,180,0,.08)
);

}

.badge{

position:absolute;

top:18px;
right:18px;

padding:8px 14px;

border-radius:999px;

background:#ffd700;

color:#1a1300;

font-size:10px;
font-weight:900;
letter-spacing:1px;

}

.top{

display:flex;
align-items:center;

gap:14px;

margin-bottom:18px;

}

.foto{

width:72px;
height:72px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.15);

background:#fff;

}

.nome{

font-size:18px;
font-weight:900;

line-height:1.2;

}

.voti{

margin-top:6px;

font-size:13px;

opacity:.7;

}

.percentuale{

font-size:54px;
font-weight:900;

margin-bottom:14px;

}

.bar{

height:14px;

border-radius:999px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

border-radius:999px;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

}

.gold .fill{

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

}

.label{

margin-top:10px;

font-size:11px;

letter-spacing:1px;

opacity:.6;

}

/* MOBILE */

@media(max-width:700px){

body{
padding:18px;
}

.title{
font-size:32px;
}

.percentuale{
font-size:42px;
}

}

</style>

</head>
<body>

<div class="header">

<div>

<div class="title">
ELEZIONI AGRIGENTO 2026
</div>

<div class="update" id="update">
Aggiornamento live...
</div>

</div>

<div class="live">

<div class="dot"></div>

LIVE

</div>

</div>

<!-- SEZIONI -->

<div class="sezioni" id="sezioni"></div>

<!-- CANDIDATI -->

<div class="grid" id="grid"></div>

<script>

async function aggiorna(){

try{

const response = await fetch(
'sindaci.json?v=' + new Date().getTime()
);

const data = await response.json();

/* ========= SEZIONI ========= */

let sezioniHTML = '';

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

const perc =
comune.sezioni_totali > 0
?
(
(comune.sezioni_scrutinate / comune.sezioni_totali)
* 100
).toFixed(0)
:
0;

sezioniHTML += `

<div class="sezione-card">

<div class="sezione-comune">
${comuneNome}
</div>

<div class="sezione-numeri">
${comune.sezioni_scrutinate}/${comune.sezioni_totali}
</div>

<div class="sezione-percentuale">
${perc}% scrutinato
</div>

</div>

`;

});

document.getElementById('sezioni').innerHTML =
sezioniHTML;

/* ========= AGRIGENTO ========= */

const comune = data["Agrigento"];

comune.totale_voti =
comune.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let html = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach((c,index)=>{

const percentuale =
comune.totale_voti > 0
?
(
(c.voti / comune.totale_voti)
* 100
).toFixed(2)
:
0;

const top2 = index < 2;

html += `

<div class="card ${top2 ? 'gold' : ''}">

${top2 ? `
<div class="badge">
BALLOTTAGGIO
</div>
` : ''}

<div class="top">

<img
class="foto"
src="${c.foto}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

document.getElementById('grid').innerHTML =
html;

document.getElementById('update').innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}catch(error){

console.error(error);

}

}

aggiorna();

setInterval(aggiorna,5000);

</script>

</body>
</html>
