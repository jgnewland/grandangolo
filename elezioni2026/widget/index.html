<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speciale Amministrative 2026 | Grandangolo Agrigento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:#edf2f7;

overflow-x:hidden;

color:#fff;

}

/* =========================
TOP ADV FULL WIDTH
========================= */

.top-adv{

width:100%;

background:#fff;

display:flex;

justify-content:center;

align-items:center;

padding:10px 0;

overflow:hidden;

border-bottom:1px solid #ddd;

}

.top-adv img{

width:100%;

max-width:1600px;

height:auto;

display:block;

}

/* =========================
SITE WRAPPER
CENTRATO
========================= */

.site-wrapper{

width:100%;

max-width:1800px;

margin:0 auto;

padding:20px;

}

/* =========================
3 COLONNE
ADV / CONTENT / ADV
========================= */

.layout{

display:grid;

grid-template-columns:
220px minmax(0,1200px) 220px;

justify-content:center;

gap:20px;

align-items:start;

}

/* =========================
LATERAL ADV
========================= */

.side-adv{

display:flex;

flex-direction:column;

gap:20px;

position:sticky;

top:20px;

}

.side-adv img{

width:100%;

display:block;

}

/* =========================
CENTRAL SITE
========================= */

.main-site{

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

padding:34px;

}

/* =========================
HEADER
========================= */

.site-header{

display:flex;

justify-content:space-between;

align-items:center;

gap:20px;

margin-bottom:30px;

flex-wrap:wrap;

}

/* BRAND */

.brand{

display:flex;

align-items:center;

gap:24px;

}

.brand-logo{

height:85px;

width:auto;

display:block;

object-fit:contain;

/* NESSUN BG */
background:transparent;

}

.brand-text{

display:flex;

flex-direction:column;

gap:10px;

}

.brand-speciale{

display:inline-flex;

align-items:center;

width:max-content;

padding:8px 14px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:11px;

font-weight:900;

letter-spacing:1px;

}

.brand-title{

font-size:54px;

font-weight:900;

line-height:1;

}

.update{

font-size:13px;

opacity:.7;

}

/* LIVE */

.live{

display:flex;

align-items:center;

gap:10px;

padding:10px 18px;

background:
rgba(255,255,255,.08);

font-size:12px;

font-weight:900;

letter-spacing:1px;

}

.dot{

width:10px;
height:10px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

/* =========================
TICKER
========================= */

.ticker-wrapper{

width:100%;

overflow:hidden;

border-top:
1px solid rgba(255,255,255,.08);

border-bottom:
1px solid rgba(255,255,255,.08);

background:
rgba(255,255,255,.05);

padding:14px 0;

margin-bottom:34px;

}

.ticker{

display:flex;

width:max-content;

animation:ticker 70s linear infinite;

}

.ticker-item{

display:flex;

align-items:center;

gap:10px;

padding:0 45px;

font-size:13px;

font-weight:700;

white-space:nowrap;

opacity:.9;

}

.ticker-time{

font-weight:900;

color:#42d3ff;

}

@keyframes ticker{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

/* =========================
SEZIONI
========================= */

.sezioni{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(180px,1fr));

gap:14px;

margin-bottom:40px;

}

.sezione-card{

padding:18px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

}

.sezione-comune{

font-size:14px;

font-weight:900;

margin-bottom:10px;

}

.sezione-numeri{

font-size:28px;

font-weight:900;

}

.sezione-percentuale{

margin-top:8px;

font-size:12px;

opacity:.7;

}

/* =========================
COMUNI
========================= */

.comune{

margin-bottom:60px;

}

.comune-title{

font-size:40px;

font-weight:900;

margin-bottom:24px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));

gap:20px;

}

/* CARD */

.card{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

padding:22px;

position:relative;

overflow:hidden;

}

.gold{

border-top:5px solid #ffd700;

background:
linear-gradient(
135deg,
rgba(255,215,0,.16),
rgba(255,180,0,.08)
);

}

.badge{

position:absolute;

top:18px;
right:18px;

padding:8px 14px;

background:#ffd700;

color:#1a1300;

font-size:10px;

font-weight:900;

letter-spacing:1px;

}

.top{

display:flex;

align-items:center;

gap:14px;

margin-bottom:18px;

}

.foto{

width:72px;
height:72px;

border-radius:50%;

object-fit:cover;

border:
3px solid rgba(255,255,255,.15);

background:#fff;

}

.nome{

font-size:18px;

font-weight:900;

line-height:1.2;

}

.voti{

margin-top:6px;

font-size:13px;

opacity:.7;

}

.percentuale{

font-size:54px;

font-weight:900;

margin-bottom:14px;

}

.bar{

height:14px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

}

.gold .fill{

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

}

.label{

margin-top:10px;

font-size:11px;

letter-spacing:1px;

opacity:.6;

}

/* =========================
MOBILE
========================= */

@media(max-width:1400px){

.layout{

grid-template-columns:
1fr;

}

.side-adv{

display:none;

}

}

@media(max-width:700px){

.site-wrapper{

padding:0;

}

.main-site{

padding:18px;

}

.brand{

align-items:flex-start;

}

.brand-logo{

height:58px;

}

.brand-title{

font-size:30px;

line-height:1.1;

}

.comune-title{

font-size:28px;

}

.percentuale{

font-size:42px;

}

.site-header{

align-items:flex-start;

}

}

</style>

</head>

<body>

<!-- TOP FULL ADV -->

<div class="top-adv">

<img
src="https://via.placeholder.com/1600x180?text=PUBBLICITA+TOP"
alt="Pubblicità"
>

</div>

<!-- WRAPPER -->

<div class="site-wrapper">

<div class="layout">

<!-- LEFT ADV -->

<aside class="side-adv">

<img
src="https://via.placeholder.com/220x600?text=ADV"
alt="Pubblicità"
>

<img
src="https://via.placeholder.com/220x300?text=ADV"
alt="Pubblicità"
>

</aside>

<!-- MAIN SITE -->

<main class="main-site">

<!-- HEADER -->

<div class="site-header">

<div class="brand">

<img
class="brand-logo"
src="https://www.grandangoloagrigento.it/wp-content/themes/grandangolo-agrigento/img/logo.png"
alt="Grandangolo Agrigento"
>

<div class="brand-text">

<div class="brand-speciale">
SPECIALE AMMINISTRATIVE 2026
</div>

<div class="brand-title">
Elezioni Comunali Agrigento
</div>

<div class="update" id="update">
Aggiornamento live...
</div>

</div>

</div>

<div class="live">

<div class="dot"></div>

LIVE

</div>

</div>

<!-- TICKER -->

<div class="ticker-wrapper">

<div class="ticker" id="ticker"></div>

</div>

<!-- SEZIONI -->

<div class="sezioni" id="sezioni"></div>

<!-- COMUNI -->

<div id="comuni-container"></div>

</main>

<!-- RIGHT ADV -->

<aside class="side-adv">

<img
src="https://via.placeholder.com/220x600?text=ADV"
alt="Pubblicità"
>

<img
src="https://via.placeholder.com/220x300?text=ADV"
alt="Pubblicità"
>

</aside>

</div>

</div>

<script>

/* RSS */

async function caricaFeed(){

try{

const rssUrl =
'https://www.grandangoloagrigento.it/politica/feed';

const api =
'https://api.rss2json.com/v1/api.json?rss_url='
+ encodeURIComponent(rssUrl);

const response =
await fetch(api);

const data =
await response.json();

let html = '';

data.items.slice(0,12).forEach(item=>{

const orario =
new Date(item.pubDate)
.toLocaleTimeString(
'it-IT',
{
hour:'2-digit',
minute:'2-digit'
}
);

html += `

<div class="ticker-item">

<span class="ticker-time">
${orario}
</span>

<span>
${item.title}
</span>

</div>

`;

});

document.getElementById('ticker').innerHTML =
html + html;

}catch(error){

console.error(error);

}

}

/* ELEZIONI */

async function aggiorna(){

try{

const response =
await fetch(
'sindaci.json?v=' + new Date().getTime()
);

const data =
await response.json();

/* SEZIONI */

let sezioniHTML = '';

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

const perc =
comune.sezioni_totali > 0
?
(
(comune.sezioni_scrutinate /
comune.sezioni_totali)
* 100
).toFixed(0)
:
0;

sezioniHTML += `

<div class="sezione-card">

<div class="sezione-comune">
${comuneNome}
</div>

<div class="sezione-numeri">
${comune.sezioni_scrutinate}/${comune.sezioni_totali}
</div>

<div class="sezione-percentuale">
${perc}% scrutinato
</div>

</div>

`;

});

document.getElementById('sezioni').innerHTML =
sezioniHTML;

/* COMUNI */

let comuniHTML = '';

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

comune.totale_voti =
comune.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let cards = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach((c,index)=>{

const percentuale =
comune.totale_voti > 0
?
(
(c.voti / comune.totale_voti)
* 100
).toFixed(2)
:
0;

const top2 = index < 2;

cards += `

<div class="card ${top2 ? 'gold' : ''}">

${top2 ? `
<div class="badge">
BALLOTTAGGIO
</div>
` : ''}

<div class="top">

<img
class="foto"
src="${c.foto}"
alt="${c.nome}"
>

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

comuniHTML += `

<section class="comune">

<div class="comune-title">
${comuneNome}
</div>

<div class="grid">
${cards}
</div>

</section>

`;

});

document.getElementById('comuni-container').innerHTML =
comuniHTML;

document.getElementById('update').innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}catch(error){

console.error(error);

}

}

caricaFeed();

aggiorna();

setInterval(aggiorna,5000);

setInterval(caricaFeed,600000);

</script>

</body>
</html>
