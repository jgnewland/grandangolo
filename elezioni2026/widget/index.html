<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speciale Amministrative 2026 | Grandangolo Agrigento</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Inter',sans-serif;

background:#eef3fb;

color:#fff;

overflow-x:hidden;

}

/* =========================
TOP ADV
========================= */

.top-adv{

width:100%;

background:#fff;

display:flex;

justify-content:center;

padding:10px 0;

border-bottom:1px solid #ddd;

}

.top-adv img{

width:100%;

max-width:1600px;

display:block;

}

/* =========================
SITE
========================= */

.site-wrapper{

width:100%;

max-width:1800px;

margin:0 auto;

padding:20px;

}

/* =========================
LAYOUT
========================= */

.layout{

display:grid;

grid-template-columns:
220px minmax(0,1200px) 220px;

gap:20px;

align-items:start;

justify-content:center;

}

/* =========================
SIDE ADV
========================= */

.side-adv{

display:flex;

flex-direction:column;

gap:20px;

position:sticky;

top:20px;

}

.side-adv img{

width:100%;

display:block;

}

/* =========================
MAIN SITE
========================= */

.main-site{

background:
linear-gradient(
135deg,
#020817 0%,
#071d46 35%,
#0d3f8f 65%,
#1d63d8 100%
);

padding:24px;

}

/* =========================
TOPBAR
========================= */

.topbar{

display:grid;

grid-template-columns:
auto 1fr auto;

align-items:center;

gap:22px;

padding:18px 22px;

margin-bottom:24px;

background:
linear-gradient(
135deg,
#00122e 0%,
#03245c 45%,
#0b4db3 100%
);

border:
1px solid rgba(255,255,255,.08);

}

/* LEFT */

.topbar-left{

display:flex;

align-items:center;

gap:18px;

min-width:max-content;

}

.logo-link{

display:flex;

align-items:center;

text-decoration:none;

}

.top-logo{

height:46px;

width:auto;

display:block;

object-fit:contain;

}

.topbar-divider{

width:1px;

height:42px;

background:
rgba(255,255,255,.12);

}

/* TITLE */

.topbar-title{

display:flex;

flex-direction:column;

gap:4px;

}

.speciale{

font-size:10px;

font-weight:900;

letter-spacing:1px;

opacity:.7;

}

.topbar-title h1{

font-size:28px;

font-weight:900;

line-height:1;

letter-spacing:-1px;

}

/* SEARCH */

.topbar-center{

width:100%;

}

.topbar-center input{

width:100%;

height:50px;

padding:0 18px;

border:none;

outline:none;

background:#fff;

font-size:14px;

font-weight:700;

color:#00122e;

}

.topbar-center input::placeholder{

color:#748295;

}

/* RIGHT */

.topbar-right{

display:flex;

align-items:center;

gap:14px;

min-width:max-content;

}

/* LIVE */

.live-box{

display:flex;

align-items:center;

gap:8px;

padding:10px 16px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

font-size:11px;

font-weight:900;

letter-spacing:1px;

}

.dot{

width:9px;
height:9px;

border-radius:50%;

background:#ff3131;

animation:pulse 1s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.5);
}

100%{
transform:scale(1);
}

}

.update{

font-size:12px;

opacity:.72;

white-space:nowrap;

}

/* =========================
TICKER
========================= */

.ticker-wrapper{

width:100%;

overflow:hidden;

background:
rgba(255,255,255,.05);

padding:12px 0;

margin-bottom:28px;

border-top:
1px solid rgba(255,255,255,.08);

border-bottom:
1px solid rgba(255,255,255,.08);

}

.ticker{

display:flex;

width:max-content;

animation:ticker 70s linear infinite;

}

.ticker-item{

display:flex;

align-items:center;

gap:10px;

padding:0 40px;

font-size:13px;

font-weight:700;

white-space:nowrap;

}

.ticker-time{

color:#42d3ff;

font-weight:900;

}

@keyframes ticker{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

/* =========================
SEZIONI
========================= */

.sezioni{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(170px,1fr));

gap:14px;

margin-bottom:40px;

}

.sezione-card{

padding:16px;

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

}

.sezione-comune{

font-size:13px;

font-weight:900;

margin-bottom:8px;

}

.sezione-numeri{

font-size:28px;

font-weight:900;

}

.sezione-percentuale{

margin-top:6px;

font-size:11px;

opacity:.7;

}

/* =========================
COMUNI
========================= */

.comune{

margin-bottom:50px;

}

.comune-title{

font-size:34px;

font-weight:900;

margin-bottom:20px;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:18px;

}

/* AGRIGENTO */

.grid-agrigento{

display:grid;

grid-template-columns:
repeat(4,1fr);

gap:18px;

}

/* CARD */

.card{

background:
rgba(255,255,255,.08);

border:
1px solid rgba(255,255,255,.08);

padding:18px;

position:relative;

overflow:hidden;

}

/* GOLD */

.gold{

border-top:4px solid #ffd700;

background:
linear-gradient(
135deg,
rgba(255,215,0,.16),
rgba(255,180,0,.08)
);

}

/* BADGE */

.badge{

position:absolute;

top:12px;
right:12px;

padding:6px 10px;

background:#ffd700;

color:#1a1300;

font-size:9px;

font-weight:900;

letter-spacing:.5px;

z-index:5;

}

/* TOP */

.top{

display:flex;

align-items:center;

gap:10px;

margin-bottom:14px;

padding-right:90px;

}

.foto{

width:54px;
height:54px;

border-radius:50%;

object-fit:cover;

border:
2px solid rgba(255,255,255,.15);

background:#fff;

}

.nome{

font-size:15px;

font-weight:900;

line-height:1.2;

word-break:break-word;

}

.voti{

margin-top:4px;

font-size:11px;

opacity:.7;

}

.percentuale{

font-size:38px;

font-weight:900;

margin-bottom:10px;

}

.bar{

height:10px;

overflow:hidden;

background:
rgba(255,255,255,.08);

}

.fill{

height:100%;

background:
linear-gradient(
90deg,
#16ff90,
#42d3ff
);

}

.gold .fill{

background:
linear-gradient(
90deg,
#ffd700,
#ffb700
);

}

.label{

margin-top:8px;

font-size:10px;

letter-spacing:1px;

opacity:.6;

}

/* =========================
INLINE ADV
========================= */

.inline-adv{

margin:50px 0;

background:#fff;

padding:10px;

display:flex;

justify-content:center;

}

.inline-adv img{

width:100%;

max-width:970px;

display:block;

}

/* MOBILE */

@media(max-width:1400px){

.layout{

grid-template-columns:
1fr;

}

.side-adv{

display:none;

}

}

@media(max-width:1200px){

.topbar{

grid-template-columns:
1fr;

gap:18px;

}

.topbar-right{

justify-content:flex-start;

}

.grid-agrigento{

grid-template-columns:
1fr 1fr;

}

}

@media(max-width:700px){

.site-wrapper{

padding:0;

}

.main-site{

padding:14px;

}

.topbar{

padding:16px;

}

.topbar-left{

flex-wrap:wrap;

gap:12px;

}

.top-logo{

height:38px;

}

.topbar-title h1{

font-size:20px;

line-height:1.1;

}

.topbar-center input{

height:48px;

font-size:14px;

}

.grid-agrigento{

grid-template-columns:
1fr;

}

.percentuale{

font-size:34px;

}

.top{

padding-right:0;

}

.badge{

position:relative;

top:auto;
right:auto;

margin-bottom:10px;

width:max-content;

}

}

</style>

</head>

<body>

<!-- TOP ADV -->
<!-- MISURA CONSIGLIATA:
970x250 oppure 1400x180 -->

<div class="top-adv">

<img
src="https://via.placeholder.com/1600x180?text=PUBBLICITA+TOP"
alt="Pubblicità"
>

</div>

<div class="site-wrapper">

<div class="layout">

<!-- LEFT ADV -->
<!-- MISURA CONSIGLIATA:
300x600 -->

<aside class="side-adv">

<img
src="https://via.placeholder.com/220x600?text=ADV"
alt="Pubblicità"
>

<img
src="https://via.placeholder.com/220x300?text=ADV"
alt="Pubblicità"
>

</aside>

<!-- MAIN -->

<main class="main-site">

<!-- TOPBAR -->

<header class="topbar">

<div class="topbar-left">

<a
href="https://www.grandangoloagrigento.it/"
target="_blank"
class="logo-link"
>

<img
class="top-logo"
src="https://www.grandangoloagrigento.it/wp-content/themes/grandangolo-agrigento/img/logo.png"
alt="Grandangolo Agrigento"
>

</a>

<div class="topbar-divider"></div>

<div class="topbar-title">

<div class="speciale">
SPECIALE AMMINISTRATIVE 2026
</div>

<h1>
ELEZIONI COMUNALI AGRIGENTO
</h1>

</div>

</div>

<div class="topbar-center">

<input
type="text"
id="searchInput"
placeholder="Cerca comune o candidato..."
onkeyup="filtraElementi()"
>

</div>

<div class="topbar-right">

<div class="live-box">

<div class="dot"></div>

LIVE

</div>

<div class="update" id="update">
Aggiornamento live...
</div>

</div>

</header>

<!-- TICKER -->

<div class="ticker-wrapper">

<div class="ticker" id="ticker"></div>

</div>

<!-- SEZIONI -->

<div class="sezioni" id="sezioni"></div>

<!-- COMUNI -->

<div id="comuni-container"></div>

<!-- INLINE ADV -->
<!-- MISURA CONSIGLIATA:
970x250 -->

<div class="inline-adv">

<img
src="https://via.placeholder.com/970x250?text=ADV+970x250"
alt="Pubblicità"
>

</div>

</main>

<!-- RIGHT ADV -->

<aside class="side-adv">

<img
src="https://via.placeholder.com/220x600?text=ADV"
alt="Pubblicità"
>

<img
src="https://via.placeholder.com/220x300?text=ADV"
alt="Pubblicità"
>

</aside>

</div>

</div>

<script>

/* SEARCH */

function filtraElementi(){

const input =
document.getElementById('searchInput')
.value
.toLowerCase();

const comuni =
document.querySelectorAll('.comune');

comuni.forEach(comune=>{

const nomeComune =
comune.querySelector('.comune-title')
.innerText
.toLowerCase();

const candidati =
comune.querySelectorAll('.nome');

let matchCandidato = false;

candidati.forEach(candidato=>{

if(
candidato.innerText
.toLowerCase()
.includes(input)
){

matchCandidato = true;

}

});

if(
nomeComune.includes(input)
||
matchCandidato
){

comune.style.display = 'block';

}else{

comune.style.display = 'none';

}

});

}

/* RSS */

async function caricaFeed(){

try{

const rssUrl =
'https://www.grandangoloagrigento.it/politica/feed';

const api =
'https://api.rss2json.com/v1/api.json?rss_url='
+ encodeURIComponent(rssUrl);

const response =
await fetch(api);

const data =
await response.json();

let html = '';

data.items.slice(0,12).forEach(item=>{

const orario =
new Date(item.pubDate)
.toLocaleTimeString(
'it-IT',
{
hour:'2-digit',
minute:'2-digit'
}
);

html += `

<div class="ticker-item">

<span class="ticker-time">
${orario}
</span>

<span>
${item.title}
</span>

</div>

`;

});

document.getElementById('ticker').innerHTML =
html + html;

}catch(error){

console.error(error);

}

}

/* ELEZIONI */

async function aggiorna(){

try{

const response =
await fetch(
'sindaci.json?v=' + new Date().getTime()
);

const data =
await response.json();

/* SEZIONI */

let sezioniHTML = '';

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

const perc =
comune.sezioni_totali > 0
?
(
(comune.sezioni_scrutinate /
comune.sezioni_totali)
* 100
).toFixed(0)
:
0;

sezioniHTML += `

<div class="sezione-card">

<div class="sezione-comune">
${comuneNome}
</div>

<div class="sezione-numeri">
${comune.sezioni_scrutinate}/${comune.sezioni_totali}
</div>

<div class="sezione-percentuale">
${perc}% scrutinato
</div>

</div>

`;

});

document.getElementById('sezioni').innerHTML =
sezioniHTML;

/* COMUNI */

let comuniHTML = '';

Object.keys(data).forEach(comuneNome=>{

const comune = data[comuneNome];

comune.totale_voti =
comune.candidati.reduce(
(sum,c)=>sum + c.voti,
0
);

let cards = '';

comune.candidati
.sort((a,b)=>b.voti-a.voti)
.forEach((c,index)=>{

const percentuale =
comune.totale_voti > 0
?
(
(c.voti / comune.totale_voti)
* 100
).toFixed(2)
:
0;

const isAgrigento =
comuneNome === 'Agrigento';

const isBallottaggio =
isAgrigento &&
(
c.nome.toLowerCase().includes('sodano')
||
c.nome.toLowerCase().includes('alonge')
);

const isWinner =
!isAgrigento &&
index === 0;

const fotoHTML =
isAgrigento
?
`
<img
class="foto"
src="${c.foto}"
alt="${c.nome}"
>
`
:
'';

cards += `

<div class="card ${isBallottaggio || isWinner ? 'gold' : ''}">

${isBallottaggio ? `
<div class="badge">
BALLOTTAGGIO
</div>
` : ''}

${isWinner ? `
<div class="badge">
SINDACO ELETTO
</div>
` : ''}

<div class="top">

${fotoHTML}

<div>

<div class="nome">
${c.nome}
</div>

<div class="voti">
${c.voti.toLocaleString()} voti
</div>

</div>

</div>

<div class="percentuale">
${percentuale}%
</div>

<div class="bar">

<div
class="fill"
style="width:${percentuale}%">
</div>

</div>

<div class="label">
PROIEZIONE LIVE
</div>

</div>

`;

});

const gridClass =
comuneNome === 'Agrigento'
?
'grid-agrigento'
:
'grid';

comuniHTML += `

<section class="comune">

<div class="comune-title">
${comuneNome}
</div>

<div class="${gridClass}">
${cards}
</div>

</section>

`;

});

document.getElementById('comuni-container').innerHTML =
comuniHTML;

document.getElementById('update').innerText =
'Aggiornato alle ' +
new Date().toLocaleTimeString('it-IT');

}catch(error){

console.error(error);

}

}

caricaFeed();

aggiorna();

setInterval(aggiorna,5000);

setInterval(caricaFeed,600000);

</script>

</body>
</html>
