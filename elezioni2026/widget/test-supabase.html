<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Ballottaggio</title>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

window.supabaseClient = createClient(
  'https://xpfmzutnptmznadzemlh.supabase.co',
  'LA_TUA_PUBLISHABLE_KEY'
);
</script>

<style>
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:#07152d;
  color:#fff;
}
.wrapper{
  display:grid;
  grid-template-columns:420px 1fr;
  gap:20px;
  padding:20px;
  min-height:100vh;
}
.panel{
  background:#0c1e3d;
  border-radius:18px;
  padding:20px;
}
input[type=number]{
  width:100%;
  padding:14px;
  font-size:28px;
  font-weight:900;
  border:none;
  border-radius:12px;
}
label{
  display:block;
  margin:12px 0 6px;
  font-weight:700;
}
.percentuale{
  margin-top:10px;
  font-size:22px;
  font-weight:900;
  color:#ffd700;
}
button{
  width:100%;
  padding:18px;
  margin-top:20px;
  border:none;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  background:#ffd700;
}
iframe{
  width:100%;
  height:100%;
  min-height:900px;
  border:none;
  border-radius:18px;
  background:#fff;
}
@media(max-width:1200px){
  .wrapper{
    grid-template-columns:1fr;
  }
}
</style>
</head>
<body>

<div class="wrapper">

  <div class="panel">

    <h2>Admin Ballottaggio</h2>

    <label>MICHELE SODANO</label>
    <input id="sodano" type="number">

    <div class="percentuale" id="percSodano">0%</div>

    <label>DINO ALONGE</label>
    <input id="alonge" type="number">

    <div class="percentuale" id="percAlonge">0%</div>

    <label>Sezioni scrutinate</label>
    <input id="sezioni" type="number">

    <button id="salva">
      SALVA SU SUPABASE
    </button>

    <div id="stato" style="margin-top:15px;"></div>

  </div>

  <div class="panel">

    <iframe
      src="https://grandangolosettimanale.it/elezioni2026/widget/balltopbar.html"
      id="preview">
    </iframe>

  </div>

</div>

</body>
</html>
