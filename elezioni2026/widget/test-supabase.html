<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Test Supabase</title>

<style>

body{
font-family:Arial,sans-serif;
background:#081225;
color:#fff;
padding:30px;
}

h1{
margin-bottom:20px;
}

pre{
background:#111827;
padding:20px;
border-radius:12px;
overflow:auto;
white-space:pre-wrap;
}

.error{
color:#ff5f5f;
font-weight:bold;
}

</style>

</head>

<body>

<h1>Test Supabase</h1>

<pre id="output">Caricamento...</pre>

<script type="module">

import { createClient }
from 'https://esm.sh/@supabase/supabase-js@2';

const supabase = createClient(
'https://xpfmzutnptmznadzemlh.supabase.co',
'sb_publishable_Tmn1caezI5nut_GJpMDr7Q_Qu7m7rzP'
);

async function carica(){

try{

const { data:candidati, error:errorCandidati } =
await supabase
.from('ballottaggio')
.select('*')
.order('id');

const { data:config, error:errorConfig } =
await supabase
.from('config')
.select('*')
.single();

document.getElementById('output').textContent =
JSON.stringify(
{
candidati,
config,
errorCandidati,
errorConfig
},
null,
2
);

}catch(error){

document.getElementById('output').innerHTML =
'<span class="error">'+error+'</span>';

console.error(error);

}

}

carica();

</script>

</body>

</html>
