<style>

.ga-google-premium{
    background:linear-gradient(90deg,#f8fff9 0%,#ffffff 50%,#f8fff9 100%);
    border-top:1px solid #e5e5e5;
    border-bottom:1px solid #e5e5e5;
    box-shadow:0 2px 10px rgba(0,0,0,.04);
}

.ga-google-premium-inner{
    max-width:1050px;
    margin:auto;
    height:56px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
}

.ga-google-left{
    display:flex;
    align-items:center;
    gap:14px;
}

.ga-google-logo{
    width:26px;
    height:26px;
    flex-shrink:0;
}

.ga-google-text{
    font-family:Arial,Helvetica,sans-serif;
    font-size:14px;
    color:#333;
    line-height:1;
}

.ga-google-text strong{
    color:#111;
    font-weight:700;
}

.ga-google-badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-right:8px;
    color:#2e9d5b;
    font-size:11px;
    font-weight:700;
    letter-spacing:.5px;
    text-transform:uppercase;
}

.ga-star{
    animation:gaGlow 2s infinite;
}

@keyframes gaGlow{

    0%,100%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.25);
        filter:
        drop-shadow(0 0 6px gold)
        drop-shadow(0 0 12px gold);
    }
}

.ga-google-btn{
    text-decoration:none;
    background:#fff;
    color:#2e9d5b;
    border:2px solid #2e9d5b;
    border-radius:30px;
    padding:8px 18px;
    font-family:Arial,Helvetica,sans-serif;
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    transition:.2s;
}

.ga-google-btn:hover{
    background:#2e9d5b;
    color:#fff;
}

@media(max-width:768px){

    .ga-google-premium-inner{
        height:auto;
        padding:10px;
    }

    .ga-google-text{
        font-size:12px;
    }

    .ga-google-btn{
        padding:6px 10px;
        font-size:11px;
    }
}

</style>
