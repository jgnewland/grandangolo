<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banner</title>
<style>
  html,body{ margin:0; padding:0; background:transparent; }
  .gw-banner{ width:100%; line-height:0; }
  .gw-imglink{ display:block; line-height:0; }
  .gw-img{ display:block; width:100%; height:auto; }   /* l'immagine decide l'altezza */
</style>
</head>
<body>

<div class="gw-banner">
  <a id="gw-link" class="gw-imglink" href="#" target="_top" rel="noopener">
    <img id="gw-img" class="gw-img" src="" alt="" />
  </a>
</div>

<script>
(function(){
  // ============================================================
  // <<< MODIFICA QUI: le tue immagini ("link" facoltativo)
  // ============================================================
  var IMAGES = [
    {
      src:  "https://www.grandangoloagrigento.it/wp-content/uploads/sites/3/2026/06/r.jpg",
      alt:  "Banner 1",
      link: ""
    },
    {
      src:  "https://www.grandangoloagrigento.it/wp-content/uploads/sites/3/2026/06/r.png",
      alt:  "Banner 2",
      link: ""
    }
  ];

  var imgEl  = document.getElementById("gw-img");
  var linkEl = document.getElementById("gw-link");
  if(!imgEl) return;

  var pick = IMAGES[Math.floor(Math.random()*IMAGES.length)];
  imgEl.src = pick.src;
  imgEl.alt = pick.alt || "";

  if(pick.link){ linkEl.href = pick.link; }
  else { linkEl.removeAttribute("href"); linkEl.style.cursor="default"; }

  // Comunica alla pagina contenitore l'altezza reale del banner,
  // cosi' l'iframe si adatta e NON si sovrappone ad altri elementi.
  function postHeight(){
    var h = document.documentElement.scrollHeight || document.body.scrollHeight || 0;
    if (h) parent.postMessage({ gwBannerHeight: h }, "*");
  }
  imgEl.addEventListener("load",  postHeight);
  imgEl.addEventListener("error", postHeight);
  window.addEventListener("load",  postHeight);
  window.addEventListener("resize", postHeight);
})();
</script>

</body>
</html>
