<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banner</title>
<style>
  html,body{ margin:0; padding:0; background:transparent; }

  .gw-banner{
    width:100%;
    height:100vh;              /* riempie l'altezza dell'iframe */
    display:flex;
    align-items:center;
    justify-content:center;
    box-sizing:border-box;
    overflow:hidden;
  }

  /* IL "FRAME" attorno all'immagine.
     padding = spessore frame (metti 0 per banner a filo). */
  .gw-frame{
    background:#ffffff;
    padding:0;                 /* <<< MODIFICA: es. 8px per un bordo bianco */
    border-radius:0;           /* <<< MODIFICA: es. 10px per angoli tondi */
    line-height:0;
    max-width:100%;
    max-height:100%;
  }

  .gw-imglink{ display:block; line-height:0; }
  .gw-img{
    display:block;
    width:100%;
    height:auto;
    max-height:100%;
    object-fit:contain;
  }
</style>
</head>
<body>

<div class="gw-banner">
  <div class="gw-frame">
    <a id="gw-link" class="gw-imglink" href="#" target="_top" rel="noopener">
      <img id="gw-img" class="gw-img" src="" alt="" />
    </a>
  </div>
</div>

<script>
(function(){
  // ============================================================
  // <<< MODIFICA QUI: le tue immagini ("link" facoltativo)
  // ============================================================
  var IMAGES = [
    {
      src:  "https://www.grandangoloagrigento.it/wp-content/uploads/sites/3/2026/06/AHgEkzkU.jpeg",
      alt:  "Banner 1",
      link: ""
    },
    {
      src:  "https://www.grandangoloagrigento.it/wp-content/uploads/sites/3/2026/06/r.png",
      alt:  "Banner 2",
      link: ""
    }
  ];

  var imgEl  = document.getElementById("gw-img");
  var linkEl = document.getElementById("gw-link");
  if(!imgEl) return;

  var pick = IMAGES[Math.floor(Math.random()*IMAGES.length)];
  imgEl.src = pick.src;
  imgEl.alt = pick.alt || "";

  if(pick.link){ linkEl.href = pick.link; }
  else { linkEl.removeAttribute("href"); linkEl.style.cursor="default"; }
})();
</script>

</body>
</html>
