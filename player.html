<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{--line:#2c3340;--amber:#f0a93b;--amber-ink:#16120a;--muted:#8b93a3;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;overflow:hidden}

  .stage{position:fixed;inset:0;background:#000;overflow:hidden;font-family:"Archivo",system-ui,sans-serif}
  #yt,#yt iframe,#video{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
  #video{display:none;object-fit:contain}
  .stage.use-file #video{display:block}
  .stage.use-file #yt{display:none}
  .stage.use-yt #video{display:none}

  .gate{position:absolute;inset:0;z-index:2;pointer-events:none}
  .stage.ad .gate{pointer-events:auto;cursor:pointer}

  .logo{position:absolute;top:14px;right:14px;z-index:3;height:34px;max-width:42%;width:auto;opacity:.92;filter:drop-shadow(0 1px 4px rgba(0,0,0,.7));pointer-events:none}
  .logo[hidden]{display:none}

  .ad-tag{position:absolute;top:14px;left:14px;z-index:3;font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);background:rgba(0,0,0,.55);backdrop-filter:blur(4px);border:1px solid rgba(240,169,59,.4);border-radius:6px;padding:5px 9px;opacity:0;transition:opacity .25s;pointer-events:none}
  .stage.ad .ad-tag{opacity:1}

  .skip-pill{position:absolute;right:16px;bottom:64px;z-index:4;display:flex;align-items:center;background:rgba(15,17,22,.85);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-weight:600;opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s;pointer-events:none}
  .stage.ad .skip-pill{opacity:1;transform:none}
  .skip-pill .count{padding:11px 16px;color:var(--muted);font-size:14px;white-space:nowrap}
  .skip-pill .go{all:unset;cursor:pointer;display:none;align-items:center;gap:9px;padding:11px 18px;color:var(--amber);font-size:14px;white-space:nowrap;pointer-events:auto}
  .skip-pill .go:hover,.skip-pill .go:focus-visible{background:var(--amber);color:var(--amber-ink)}
  .skip-pill .go::after{content:"";border-left:11px solid currentColor;border-top:7px solid transparent;border-bottom:7px solid transparent;display:inline-block}
  .skip-pill .go .bar{width:3px;height:14px;background:currentColor;display:inline-block;margin-right:-4px}
  .skip-pill.ready .count{display:none}
  .skip-pill.ready .go{display:flex}

  .poster{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;cursor:pointer}
  .poster::before{content:"";position:absolute;inset:0;background:rgba(10,12,16,.45)}
  .poster .pbtn{position:relative;width:74px;height:74px;border-radius:50%;background:var(--amber);display:grid;place-items:center;transition:transform .2s}
  .poster:hover .pbtn{transform:scale(1.06)}
  .poster .pbtn::after{content:"";border-left:22px solid var(--amber-ink);border-top:14px solid transparent;border-bottom:14px solid transparent;margin-left:6px}
  .poster.hidden{display:none}

  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="stage idle" id="stage">
    <div id="yt"></div>
    <video id="video" playsinline></video>
    <div class="gate" id="gate"></div>
    <img class="logo" id="logo" alt="" hidden>
    <div class="ad-tag">Annuncio</div>
    <div class="skip-pill" id="skipPill">
      <span class="count" id="skipCount">Puoi saltare tra 5s</span>
      <button class="go" id="skipBtn"><span class="bar"></span>Salta annuncio</button>
    </div>
    <div class="poster" id="poster"><div class="pbtn"></div></div>
  </div>

<script>
/* =========================================================
   CONFIG — valori fissi OPPURE parametri nell'URL:
   player.html?pre=...&main=...&skip=5&mute=0
   "pre" e "main" accettano un link YouTube/ID oppure l'URL
   diretto di un file video (.mp4, .webm…) caricato sul sito.
   I parametri nell'URL hanno la precedenza.
   ========================================================= */
const DEFAULT_LOGO = "https://www.grandangoloagrigento.it/wp-content/themes/grandangolo-agrigento/img/logo.png";
const qs = new URLSearchParams(location.search);
const CONFIG = {
  preroll:   qs.get('pre')  || "",
  main:      qs.get('main') || "",
  skipAfter: parseInt(qs.get('skip'),10) || 5,
  muteAd:    qs.get('mute') === '1',
  logo:      qs.get('logo') || DEFAULT_LOGO
};
/* ========================================================= */

(function(){
  const stage=document.getElementById('stage');
  const gate=document.getElementById('gate');
  const poster=document.getElementById('poster');
  const pill=document.getElementById('skipPill');
  const skipCount=document.getElementById('skipCount');
  const skipBtn=document.getElementById('skipBtn');
  const logoEl=document.getElementById('logo');
  const video=document.getElementById('video');

  let ytPlayer=null, ytReady=false;
  let active='none';      // yt | file
  let phase='idle';       // idle | ad | main
  let srcPre=null, srcMain=null;
  let skipAfter=CONFIG.skipAfter||5, skipTimer=null;

  function ytId(s){
    if(!s) return "";
    s=String(s).trim();
    if(/^[\w-]{11}$/.test(s)) return s;
    const m=s.match(/(?:youtu\.be\/|[?&]v=|\/embed\/|\/shorts\/|\/live\/)([\w-]{11})/);
    return m?m[1]:"";
  }
  function classify(u){
    const id=ytId(u); if(id) return {type:'yt',id:id};
    u=(u||'').trim();
    if(/^https?:\/\//i.test(u)) return {type:'file',url:u};
    return null;
  }

  srcPre=classify(CONFIG.preroll);
  srcMain=classify(CONFIG.main);
  const needsYT = (srcPre&&srcPre.type==='yt')||(srcMain&&srcMain.type==='yt');

  if(CONFIG.logo){ logoEl.src=CONFIG.logo; logoEl.hidden=false; logoEl.onerror=()=>{logoEl.hidden=true;}; }
  if(srcMain&&srcMain.type==='yt') poster.style.backgroundImage='url(https://i.ytimg.com/vi/'+srcMain.id+'/maxresdefault.jpg)';

  // YouTube API (caricata solo se serve)
  if(needsYT){
    const tag=document.createElement('script');
    tag.src="https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  }else{ ytReady=true; }

  window.onYouTubeIframeAPIReady=function(){
    ytPlayer=new YT.Player('yt',{
      width:'100%',height:'100%',
      playerVars:{rel:0,modestbranding:1,playsinline:1,controls:1,fs:1,iv_load_policy:3},
      events:{onReady:()=>{ytReady=true;},onStateChange:onYtState}
    });
  };
  function onYtState(e){ if(e.data===YT.PlayerState.ENDED && phase==='ad') playMain(); }
  video.addEventListener('ended',()=>{ if(phase==='ad') playMain(); });

  function setActive(kind){
    active=kind;
    stage.classList.toggle('use-yt', kind==='yt');
    stage.classList.toggle('use-file', kind==='file');
  }
  function curTime(){
    if(active==='yt'){ try{return ytPlayer.getCurrentTime()||0;}catch(_){return 0;} }
    return video.currentTime||0;
  }
  function playSrc(src,isAd){
    if(src.type==='yt'){
      setActive('yt');
      ytPlayer.loadVideoById(src.id);
      if(isAd && CONFIG.muteAd) ytPlayer.mute(); else ytPlayer.unMute();
    }else{
      setActive('file');
      video.src=src.url;
      video.controls=!isAd;            // niente controlli durante l'annuncio
      video.muted=(isAd && CONFIG.muteAd);
      const p=video.play(); if(p&&p.catch) p.catch(()=>{});
    }
  }

  function canStart(){ return srcPre && srcMain && (!needsYT || ytReady); }
  poster.addEventListener('click',()=>{ if(canStart()) startAd(); });

  function startAd(){
    poster.classList.add('hidden');
    phase='ad';
    stage.classList.remove('idle'); stage.classList.add('ad');
    pill.classList.remove('ready');
    playSrc(srcPre,true);
    startCountdown();
  }
  function startCountdown(){
    clearInterval(skipTimer);
    const tick=()=>{
      if(phase!=='ad') return;
      const remaining=Math.max(0,skipAfter-Math.floor(curTime()));
      if(remaining<=0){ pill.classList.add('ready'); clearInterval(skipTimer); }
      else skipCount.textContent='Puoi saltare tra '+remaining+'s';
    };
    tick(); skipTimer=setInterval(tick,250);
  }
  function playMain(){
    phase='main';
    stage.classList.remove('ad');
    pill.classList.remove('ready');
    clearInterval(skipTimer);
    playSrc(srcMain,false);
  }

  skipBtn.addEventListener('click',e=>{ e.stopPropagation(); if(phase==='ad') playMain(); });
  gate.addEventListener('click',()=>{
    if(phase!=='ad') return;
    if(active==='yt'){
      const st=ytPlayer.getPlayerState();
      if(st===YT.PlayerState.PLAYING) ytPlayer.pauseVideo(); else ytPlayer.playVideo();
    }else{
      video.paused?video.play():video.pause();
    }
  });
})();
</script>
</body>
</html>
