<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--line:#294035;--green:#1fb069;--green-ink:#03220f;--mint:#76e3aa;--muted:#8aa89a;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#000;overflow:hidden}

  .stage{position:fixed;inset:0;background:#000;overflow:hidden;font-family:"Archivo",system-ui,sans-serif;container-type:size}
  .stage:fullscreen,.stage:-webkit-full-screen{width:100vw;height:100vh;border-radius:0;border:0;aspect-ratio:auto}
  #yt,#yt iframe,#video{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
  #video{display:none;object-fit:contain}
  .stage.use-file #video{display:block}.stage.use-file #yt{display:none}.stage.use-yt #video{display:none}

  .gate{position:absolute;inset:0;z-index:2;pointer-events:none}
  .stage.ad .gate{pointer-events:auto;cursor:pointer}

  /* cluster in alto a destra: pulsante schermo intero + logo */
  .topright{position:absolute;top:3cqh;right:3cqw;z-index:5;display:flex;align-items:center;gap:2.2cqw}
  .logo{height:clamp(20px,7cqh,40px);width:auto;max-width:40cqw;opacity:.92;filter:drop-shadow(0 1px 4px rgba(0,0,0,.7));pointer-events:none;transition:opacity .35s}
  .logo[hidden]{display:none}
  .stage.outro .logo{opacity:0}                 /* logo nascosto durante l'outro */
  .fsbtn{all:unset;cursor:pointer;width:clamp(26px,8cqh,36px);height:clamp(26px,8cqh,36px);display:grid;place-items:center;border-radius:7px;background:rgba(10,18,14,.55);backdrop-filter:blur(4px);border:1px solid rgba(118,227,170,.3)}
  .fsbtn:hover{background:rgba(31,176,105,.9)}
  .fsbtn svg{width:55%;height:55%;fill:#fff}

  .ad-tag{position:absolute;top:3cqh;left:3cqw;z-index:3;font-weight:600;font-size:clamp(9px,2.4cqw,12px);letter-spacing:.14em;text-transform:uppercase;color:var(--mint);background:rgba(0,0,0,.55);backdrop-filter:blur(4px);border:1px solid rgba(118,227,170,.4);border-radius:6px;padding:.6cqh 1.6cqw;opacity:0;transition:opacity .25s;pointer-events:none}
  .stage.ad .ad-tag{opacity:1}

  /* ---- LOWER THIRD (con voce sopra il titolo) ---- */
  .l3group{--l3scale:1;position:absolute;left:0;bottom:11%;z-index:6;display:flex;flex-direction:column;align-items:flex-start;max-width:94%;
    transform:translateX(-103%);opacity:0;pointer-events:none;
    transition:transform .55s cubic-bezier(.22,1,.36,1),opacity .45s}
  .l3group.show{transform:none;opacity:1}
  .kicker{background:linear-gradient(90deg,rgba(7,17,12,.95),rgba(7,17,12,.55));color:var(--mint);font-weight:600;
    font-size:calc(clamp(8px,2.3cqw,14px) * var(--l3scale));letter-spacing:.09em;text-transform:uppercase;
    padding:.5cqh 2.4cqw .5cqh 2cqw;line-height:1.15;border-left:6px solid var(--green);margin-bottom:.5cqh}
  .kicker[hidden]{display:none}
  .l3bar{display:flex;align-items:stretch}
  .l3bar[hidden]{display:none}
  .l3bar .accent{width:6px;background:var(--green);flex:none}
  .l3bar .body{background:linear-gradient(90deg,rgba(7,17,12,.94),rgba(7,17,12,.72));padding:1cqh 3cqw 1.1cqh 2cqw;backdrop-filter:blur(6px);min-width:0}
  .l3bar .l1{display:block;font-weight:700;font-size:calc(clamp(14px,4.4cqw,30px) * var(--l3scale));color:#fff;line-height:1.12;letter-spacing:.005em}
  .l3bar .l2{display:block;font-weight:600;font-size:calc(clamp(9px,2.7cqw,16px) * var(--l3scale));color:var(--mint);margin-top:.4cqh;text-transform:uppercase;letter-spacing:.09em}
  .l3bar .l2[hidden]{display:none}

  .skip-pill{position:absolute;right:3cqw;bottom:11cqh;z-index:4;display:flex;align-items:center;background:rgba(10,18,14,.85);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:10px;overflow:hidden;font-weight:600;opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s;pointer-events:none}
  .stage.ad .skip-pill{opacity:1;transform:none}
  .skip-pill .count{padding:1.6cqh 2.6cqw;color:var(--muted);font-size:clamp(11px,3cqw,14px);white-space:nowrap}
  .skip-pill .go{all:unset;cursor:pointer;display:none;align-items:center;gap:1.4cqw;padding:1.6cqh 3cqw;color:var(--mint);font-size:clamp(11px,3cqw,14px);white-space:nowrap;pointer-events:auto}
  .skip-pill .go:hover,.skip-pill .go:focus-visible{background:var(--green);color:var(--green-ink)}
  .skip-pill .go::after{content:"";border-left:11px solid currentColor;border-top:7px solid transparent;border-bottom:7px solid transparent;display:inline-block}
  .skip-pill .go .bar{width:3px;height:14px;background:currentColor;display:inline-block;margin-right:-4px}
  .skip-pill.ready .count{display:none}.skip-pill.ready .go{display:flex}

  .poster{position:absolute;inset:0;z-index:7;display:flex;align-items:center;justify-content:center;background-size:cover;background-position:center;cursor:pointer}
  .poster::before{content:"";position:absolute;inset:0;background:rgba(8,14,11,.45)}
  .poster .pbtn{position:relative;width:clamp(50px,16cqw,74px);height:clamp(50px,16cqw,74px);font-size:clamp(50px,16cqw,74px);border-radius:50%;background:var(--green);display:grid;place-items:center;transition:transform .2s}
  .poster:hover .pbtn{transform:scale(1.06)}
  .poster .pbtn::after{content:"";border-left:.3em solid var(--green-ink);border-top:.19em solid transparent;border-bottom:.19em solid transparent;margin-left:.08em}
  .poster.hidden{display:none}

  .replay{position:absolute;inset:0;z-index:8;display:flex;flex-direction:column;gap:2cqh;align-items:center;justify-content:center;background:rgba(8,14,11,.62);backdrop-filter:blur(2px);cursor:pointer}
  .replay[hidden]{display:none}
  .replay .rbtn{all:unset;cursor:pointer;width:clamp(50px,16cqw,72px);height:clamp(50px,16cqw,72px);border-radius:50%;background:var(--green);display:grid;place-items:center;transition:transform .2s}
  .replay:hover .rbtn{transform:scale(1.06)}
  .replay .rbtn svg{width:50%;height:50%;fill:var(--green-ink)}
  .replay .rlabel{font-family:"Archivo",sans-serif;font-weight:600;font-size:clamp(11px,3cqw,15px);letter-spacing:.06em;text-transform:uppercase;color:#fff}
  .unmute{position:absolute;left:3cqw;bottom:10%;z-index:6;display:none;align-items:center;gap:1.6cqw;background:var(--green);color:var(--green-ink);font-family:"Archivo",sans-serif;font-weight:700;font-size:clamp(11px,2.8cqw,14px);padding:1.4cqh 2.8cqw;border:0;border-radius:9px;cursor:pointer;box-shadow:0 3px 14px rgba(0,0,0,.45)}
  .unmute.show{display:flex}
  .unmute svg{width:1.15em;height:1.15em;fill:currentColor}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="stage idle" id="stage">
    <div id="yt"></div>
    <video id="video" playsinline controlsList="nodownload nofullscreen" disablePictureInPicture></video>
    <div class="gate" id="gate"></div>
    <div class="topright">
      <button class="fsbtn" id="fsbtn" aria-label="Schermo intero">
        <svg viewBox="0 0 24 24" id="fsIcon"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
      <img class="logo" id="logo" alt="" hidden>
    </div>
    <div class="ad-tag">Annuncio</div>
    <div class="l3group" id="l3group">
      <div class="kicker" id="kicker" hidden><span id="topTxt"></span></div>
      <div class="l3bar" id="l3bar">
        <span class="accent"></span>
        <span class="body"><span class="l1" id="l1"></span><span class="l2" id="l2" hidden></span></span>
      </div>
    </div>
    <div class="skip-pill" id="skipPill">
      <span class="count" id="skipCount">Puoi saltare tra 5s</span>
      <button class="go" id="skipBtn"><span class="bar"></span>Salta annuncio</button>
    </div>
    <button class="unmute" id="unmute" aria-label="Attiva audio"><svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3zM12 4 9.91 6.09 12 8.18V4z"/></svg>Attiva audio</button>
    <div class="poster" id="poster"><div class="pbtn"></div></div>
    <div class="replay" id="replay" hidden>
      <button class="rbtn" id="rbtn" aria-label="Rivedi dall'inizio">
        <svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
      <span class="rlabel">Rivedi</span>
    </div>
  </div>

<script>
/* =========================================================
   CONFIG — parametri nell'URL:
   player.html?pre=...&main=...&outro=...&skip=5&mute=0
              &t1=...&t2=...&ld=6&ts=100&tt=...&logo=...
   pre/main/outro : link YouTube/ID o URL diretto di un file video.
   t1/t2 = lower third, ld = secondi a schermo (0=sempre), ts = dimensione % (100=normale)
   tt = voce sopra il titolo (es. "Servizio di…" o il luogo)
   ========================================================= */
const DEFAULT_LOGO  = "https://www.grandangoloagrigento.it/wp-content/themes/grandangolo-agrigento/img/logo.png";
const DEFAULT_OUTRO = "https://videos.files.wordpress.com/NM27JxmI/lv_0_20260613183516-1.mp4";
const qs = new URLSearchParams(location.search);
const CONFIG = {
  preroll:   qs.get('pre')  || "",
  main:      qs.get('main') || "",
  outro:     qs.has('outro') ? qs.get('outro') : DEFAULT_OUTRO,
  skipAfter: parseInt(qs.get('skip'),10) || 5,
  muteAd:    qs.get('mute') === '1',
  logo:      qs.get('logo') || DEFAULT_LOGO,
  t1:        qs.get('t1') || "",
  t2:        qs.get('t2') || "",
  ldDur:     qs.has('ld') ? (parseInt(qs.get('ld'),10)||0) : 6,
  l3scale:   qs.has('ts') ? ((parseInt(qs.get('ts'),10)||100)/100) : 1,
  topText:   qs.get('tt') || "",
  autoplay:  qs.get('autoplay') === '1'
};
/* ========================================================= */

(function(){
  const stage=document.getElementById('stage');
  const gate=document.getElementById('gate');
  const poster=document.getElementById('poster');
  const replay=document.getElementById('replay');
  const pill=document.getElementById('skipPill');
  const skipCount=document.getElementById('skipCount');
  const skipBtn=document.getElementById('skipBtn');
  const logoEl=document.getElementById('logo');
  const video=document.getElementById('video');
  const l3group=document.getElementById('l3group'), l3bar=document.getElementById('l3bar');
  const l1=document.getElementById('l1'), l2=document.getElementById('l2');
  const kicker=document.getElementById('kicker'), topTxt=document.getElementById('topTxt');
  const fsbtn=document.getElementById('fsbtn'), fsIcon=document.getElementById('fsIcon');
  const unmute=document.getElementById('unmute');

  let ytPlayer=null, ytReady=false;
  let active='none', phase='idle';
  let srcPre=null, srcMain=null, srcOutro=null;
  let skipAfter=CONFIG.skipAfter||5, skipTimer=null, l3in=null, l3out=null, ytEndWatch=null;
  let soundOn=true;

  function ytId(s){
    if(!s) return "";
    s=String(s).trim();
    if(/^[\w-]{11}$/.test(s)) return s;
    const m=s.match(/(?:youtu\.be\/|[?&]v=|\/embed\/|\/shorts\/|\/live\/)([\w-]{11})/);
    return m?m[1]:"";
  }
  function classify(u){
    const id=ytId(u); if(id) return {type:'yt',id:id};
    u=(u||'').trim();
    if(/^https?:\/\//i.test(u)) return {type:'file',url:u};
    return null;
  }

  srcPre=classify(CONFIG.preroll);
  srcMain=classify(CONFIG.main);
  srcOutro=classify(CONFIG.outro);
  const needsYT=[srcPre,srcMain,srcOutro].some(s=>s&&s.type==='yt');

  if(CONFIG.logo){ logoEl.src=CONFIG.logo; logoEl.hidden=false; logoEl.onerror=()=>{logoEl.hidden=true;}; }
  if(srcMain&&srcMain.type==='yt') poster.style.backgroundImage='url(https://i.ytimg.com/vi/'+srcMain.id+'/maxresdefault.jpg)';

  // testo sovrimpressioni
  l3group.style.setProperty('--l3scale', CONFIG.l3scale);
  l1.textContent=CONFIG.t1||'';
  l3bar.hidden=!CONFIG.t1;
  if(CONFIG.t2){ l2.textContent=CONFIG.t2; l2.hidden=false; } else l2.hidden=true;
  topTxt.textContent=CONFIG.topText||'';
  kicker.hidden=!CONFIG.topText;

  if(needsYT){
    const tag=document.createElement('script');
    tag.src="https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  }else{ ytReady=true; }

  window.onYouTubeIframeAPIReady=function(){
    ytPlayer=new YT.Player('yt',{
      width:'100%',height:'100%',
      playerVars:{rel:0,modestbranding:1,playsinline:1,controls:1,fs:0,iv_load_policy:3,origin:location.origin},
      events:{onReady:()=>{ytReady=true; maybeAutostart();},onStateChange:onYtState}
    });
  };
  function onYtState(e){ if(e.data===YT.PlayerState.ENDED) onEnded(); }
  video.addEventListener('ended',onEnded);
  function onEnded(){ if(phase==='ad') playMain(); else if(phase==='main') playOutro(); else if(phase==='outro') showReplay(); }
  function showReplay(){ phase='end'; if(replay) replay.hidden=false; }
  if(replay) replay.addEventListener('click',()=>{ soundOn=true; replay.hidden=true; startAd(); });

  function setActive(kind){ active=kind; stage.classList.toggle('use-yt',kind==='yt'); stage.classList.toggle('use-file',kind==='file'); }
  function curTime(){ if(active==='yt'){try{return ytPlayer.getCurrentTime()||0;}catch(_){return 0;}} return video.currentTime||0; }

  function applyMute(forceMute){
    const m = forceMute || !soundOn;
    if(active==='yt'){ try{ m?ytPlayer.mute():ytPlayer.unMute(); }catch(_){} }
    else video.muted=m;
  }
  function playSrc(src,showControls,forceMute){
    if(src.type==='yt'){
      setActive('yt');
      ytPlayer.loadVideoById(src.id);
      applyMute(forceMute);
    }else{
      setActive('file');
      video.src=src.url;
      video.controls=showControls;
      video.muted=(forceMute || !soundOn);
      video.play().catch(()=>{ video.muted=true; video.play().catch(()=>{}); });
    }
    updateUnmute();
  }
  function updateUnmute(){ unmute.classList.toggle('show', CONFIG.autoplay && !soundOn && (phase==='ad'||phase==='main'||phase==='outro')); }
  function enableSound(){ if(soundOn) return; soundOn=true; applyMute(false); updateUnmute(); }
  function maybeAutostart(){ if(CONFIG.autoplay && phase==='idle' && canStart()){ soundOn=false; startAd(); } }

  function showLowerGroup(){
    if(!CONFIG.t1 && !CONFIG.topText) return;
    clearTimeout(l3in); clearTimeout(l3out);
    l3group.classList.remove('show');
    l3in=setTimeout(()=>{
      l3group.classList.add('show');
      if(CONFIG.ldDur>0) l3out=setTimeout(()=>l3group.classList.remove('show'), CONFIG.ldDur*1000);
    },800);
  }

  function startYtEndWatch(){
    clearInterval(ytEndWatch);
    ytEndWatch=setInterval(()=>{
      if(phase!=='main'||active!=='yt'){ clearInterval(ytEndWatch); return; }
      try{
        const st=ytPlayer.getPlayerState();
        const d=ytPlayer.getDuration()||0, t=ytPlayer.getCurrentTime()||0;
        if(st===YT.PlayerState.ENDED || (d>0 && t>=d-0.6)){ clearInterval(ytEndWatch); onEnded(); }
      }catch(_){}
    },500);
  }

  function canStart(){ return srcPre && srcMain && (!needsYT || ytReady); }
  poster.addEventListener('click',()=>{ soundOn=true; if(canStart()) startAd(); });

  function startAd(){
    poster.classList.add('hidden');
    if(replay) replay.hidden=true;
    phase='ad';
    stage.classList.remove('idle','outro'); stage.classList.add('ad');
    pill.classList.remove('ready');
    l3group.classList.remove('show');
    playSrc(srcPre,false,CONFIG.muteAd);
    startCountdown();
  }
  function startCountdown(){
    clearInterval(skipTimer);
    const tick=()=>{
      if(phase!=='ad') return;
      const remaining=Math.max(0,skipAfter-Math.floor(curTime()));
      if(remaining<=0){ pill.classList.add('ready'); clearInterval(skipTimer); }
      else skipCount.textContent='Puoi saltare tra '+remaining+'s';
    };
    tick(); skipTimer=setInterval(tick,250);
  }
  function playMain(){
    phase='main';
    stage.classList.remove('ad','outro');
    pill.classList.remove('ready');
    clearInterval(skipTimer);
    playSrc(srcMain,true,false);
    showLowerGroup();
    if(active==='yt') startYtEndWatch();
  }
  function playOutro(){
    clearTimeout(l3in); clearTimeout(l3out);
    l3group.classList.remove('show');
    if(!srcOutro){ showReplay(); return; }
    phase='outro';
    stage.classList.remove('ad'); stage.classList.add('outro');   // nasconde il logo
    playSrc(srcOutro,false,false);
  }

  unmute.addEventListener('click',e=>{ e.stopPropagation(); enableSound(); });
  skipBtn.addEventListener('click',e=>{ e.stopPropagation(); enableSound(); if(phase==='ad') playMain(); });
  gate.addEventListener('click',()=>{
    if(phase!=='ad') return;
    if(active==='yt'){ const st=ytPlayer.getPlayerState(); if(st===YT.PlayerState.PLAYING) ytPlayer.pauseVideo(); else ytPlayer.playVideo(); }
    else { video.paused?video.play():video.pause(); }
  });

  /* ---- schermo intero su tutto il player ---- */
  const ICON_EXPAND='M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z';
  const ICON_SHRINK='M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z';
  function fsActive(){ return document.fullscreenElement||document.webkitFullscreenElement; }
  fsbtn.addEventListener('click',()=>{
    if(fsActive()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else { const r=stage.requestFullscreen||stage.webkitRequestFullscreen; if(r) r.call(stage); }
  });
  function onFsChange(){ fsIcon.setAttribute('d', fsActive()?ICON_SHRINK:ICON_EXPAND); }
  document.addEventListener('fullscreenchange',onFsChange);
  document.addEventListener('webkitfullscreenchange',onFsChange);

  maybeAutostart();
})();
</script>
</body>
</html>
